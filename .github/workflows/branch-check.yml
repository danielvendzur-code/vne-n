name: Branch check

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bun install 2>&1 | tee /tmp/install.log

      - name: Lint
        id: lint
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee /tmp/lint.log

      - name: Node server build
        id: node_build
        if: always()
        continue-on-error: true
        shell: bash
        env:
          NITRO_PRESET: node-server
        run: |
          set -o pipefail
          bun run build 2>&1 | tee /tmp/node-build.log

      - name: GitHub Pages build
        id: pages_build
        if: always()
        continue-on-error: true
        shell: bash
        env:
          VITE_BASE_PATH: /vne-n/
          NITRO_PRESET: node-server
        run: |
          set -o pipefail
          bun run build 2>&1 | tee /tmp/pages-build.log

      - name: Export GitHub Pages
        id: pages_export
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/vne-n-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/vne-n-server.log
              exit 1
            fi
            sleep 1
          done

          PAGES_BASE=vne-n node scripts/export-github-pages.mjs 2>&1 | tee /tmp/pages-export.log

      - name: Zapísať výsledok na vetvu
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          NODE_BUILD_OUTCOME: ${{ steps.node_build.outcome }}
          PAGES_BUILD_OUTCOME: ${{ steps.pages_build.outcome }}
          PAGES_EXPORT_OUTCOME: ${{ steps.pages_export.outcome }}
        run: |
          {
            echo "install=$INSTALL_OUTCOME"
            echo "lint=$LINT_OUTCOME"
            echo "node_build=$NODE_BUILD_OUTCOME"
            echo "pages_build=$PAGES_BUILD_OUTCOME"
            echo "pages_export=$PAGES_EXPORT_OUTCOME"
            for log in /tmp/install.log /tmp/lint.log /tmp/node-build.log /tmp/pages-build.log /tmp/pages-export.log /tmp/vne-n-server.log; do
              if [ -f "$log" ]; then
                echo
                echo "===== $log ====="
                tail -n 100 "$log"
              fi
            done
          } > .branch-check-result.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .branch-check-result.txt
          git commit -m "chore: zapíš výsledok branch checku"
          git push
