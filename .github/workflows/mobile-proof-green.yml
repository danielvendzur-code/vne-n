name: Mobile proof green

on:
  push:
    branches: [claude/web-portfolio-publish-ynh7sk]

permissions:
  contents: write

jobs:
  proof:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip mobile-green]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: NITRO_PRESET=node-server bun run build
      - run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-mobile-green
          cat > qa-mobile-green/proof.spec.ts <<'TEST'
          import { test, expect } from "@playwright/test";
          import fs from "node:fs";

          test("final mobile layout", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            const consent = encodeURIComponent(JSON.stringify({ version: 1, necessary: true, analytics: false, updatedAt: new Date().toISOString() }));
            await context.addCookies([{ name: "vendzur_cookie_consent", value: consent, url: "http://127.0.0.1:3000", sameSite: "Lax" }]);
            const page = await context.newPage();
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto("http://127.0.0.1:3000", { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1500);
            expect(errors).toEqual([]);
            expect(await page.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth)).toBeLessThanOrEqual(1);

            const card = await page.locator(".lp-assistant-card").boundingBox();
            if (!card) throw new Error("Missing card");
            expect(card.width).toBeGreaterThan(340);
            expect(card.x).toBeGreaterThanOrEqual(14);
            expect(390 - card.x - card.width).toBeGreaterThanOrEqual(14);

            const buttons = await page.locator(".lp-assistant-chips button").evaluateAll((items) => items.map((item) => {
              const rect = item.getBoundingClientRect();
              const fill = item.querySelector<HTMLElement>(".lp-chip-liquid")?.getBoundingClientRect();
              return { x: rect.x, y: rect.y, width: rect.width, height: rect.height, fillWidth: fill?.width ?? 0, fillHeight: fill?.height ?? 0 };
            }));
            expect(buttons).toHaveLength(3);
            expect(buttons.every((item) => item.width > 300)).toBe(true);
            expect(buttons[1].y).toBeGreaterThan(buttons[0].y + buttons[0].height - 1);
            expect(buttons[2].y).toBeGreaterThan(buttons[1].y + buttons[1].height - 1);
            const active = buttons.find((item) => item.fillWidth > 0)!;
            expect(active.fillWidth).toBeGreaterThan(active.width - 3);
            expect(active.fillHeight).toBeGreaterThan(active.height - 3);
            expect(await page.locator(".lp-assistant-chips").getAttribute("data-drag-ready")).toBeNull();

            const glide = await page.locator(".glide-field--hero .glide-field__canvas").evaluate((element) => ({
              name: getComputedStyle(element).animationName,
              state: getComputedStyle(element).animationPlayState,
            }));
            expect(glide.name).toContain("vendzur-glide-drift");
            expect(glide.name).toContain("vendzur-glide-breathe");
            expect(glide.state).toContain("running");

            const caps = page.locator(".lp-caps");
            await caps.scrollIntoViewIfNeeded();
            await page.waitForTimeout(500);
            const chips = await caps.locator(".lp-chip").evaluateAll((items) => items.slice(0, 4).map((item) => {
              const rect = item.getBoundingClientRect();
              return { y: rect.y, width: rect.width, height: rect.height };
            }));
            expect(chips.length).toBeGreaterThan(3);
            expect(chips.every((item) => item.width > 320)).toBe(true);
            for (let index = 1; index < chips.length; index += 1) expect(chips[index].y).toBeGreaterThan(chips[index - 1].y + chips[index - 1].height - 1);
            expect(await page.locator(".lp-caps-chips").getAttribute("data-drag-ready")).toBeNull();
            await page.screenshot({ path: "qa-mobile-green/mobile.png", fullPage: true });
            fs.writeFileSync("qa-mobile-green/result.json", JSON.stringify({ card, buttons, glide, chips, passed: true }, null, 2));
            await context.close();
          });
          TEST
          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            sleep 1
          done
          npx playwright test qa-mobile-green/proof.spec.ts --workers=1 --reporter=line > /tmp/mobile-green.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-green-${{ github.run_id }}
          path: qa-mobile-green
          retention-days: 3
      - name: Result
        if: always()
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "test=${{ steps.test.outcome }}"
            cat /tmp/mobile-green.log 2>/dev/null || true
          } > MOBILE_GREEN_AUDIT.txt
          echo "${{ github.run_id }}" > MOBILE_GREEN_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MOBILE_GREEN_AUDIT.txt MOBILE_GREEN_RUN_ID.txt
          git commit -m "chore: ulož zelený mobilný audit [skip mobile-green]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
