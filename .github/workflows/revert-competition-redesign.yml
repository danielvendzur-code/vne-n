name: Revert competition redesign

on:
  push:
    branches: [agent/revert-competition-redesign]

permissions:
  contents: write

jobs:
  revert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout revert branch
        uses: actions/checkout@v4
        with:
          ref: agent/revert-competition-redesign
          fetch-depth: 0

      - name: Revert competition redesign exactly
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-commit 649fe58e560d1a3a0879dd7cd1fff07b06125c65
          rm -f .github/workflows/revert-competition-redesign.yml
          git add -A
          git commit -m "Revert competition homepage redesign"
          git push origin HEAD:agent/revert-competition-redesign
