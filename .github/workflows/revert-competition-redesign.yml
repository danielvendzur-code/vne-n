name: Revert competition redesign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revert:
    if: github.head_ref == 'agent/revert-competition-redesign'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout revert branch
        uses: actions/checkout@v4
        with:
          ref: agent/revert-competition-redesign
          fetch-depth: 0

      - name: Restore pre-redesign source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout 2030689acaa00fffd9be74f545b572784d92a827 -- \
            scripts/export-github-pages.mjs \
            scripts/security-audit.mjs \
            src/components/site/Layout.tsx \
            src/components/site/TasteSystemFinal.css \
            src/routes/index.tsx \
            tests/home-contract.test.mjs
          git rm -f --ignore-unmatch src/components/site/CompetitionLanding.tsx
          rm -f REVERT_PENDING.txt REVERT_TRIGGER_2.txt
          git add -A
          if git diff --cached --quiet; then
            echo "source files already restored"
            exit 0
          fi
          git commit -m "Restore homepage before competition redesign"
          git push origin HEAD:agent/revert-competition-redesign
