name: Cookie consent audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

concurrency:
  group: cookie-consent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip cookie-audit]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for consent-aware widget
        id: widget
        continue-on-error: true
        shell: bash
        run: |
          ready=false
          for attempt in {1..90}; do
            SOURCE=$(curl -fsS "https://danielvendzur-code.github.io/moj.chatbot.backend/widget.js?cookie-audit=${GITHUB_RUN_ID}-${attempt}" || true)
            if echo "$SOURCE" | grep -q "analyticsConsent" && echo "$SOURCE" | grep -q "granted"; then
              ready=true
              break
            fi
            sleep 2
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
          test "$ready" = true

      - name: Install, lint and build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          bun install > /tmp/install.log 2>&1
          bun run lint > /tmp/lint.log 2>&1
          NITRO_PRESET=node-server bun run build > /tmp/build.log 2>&1

      - name: Install Playwright
        id: playwright
        continue-on-error: true
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright.log 2>&1

      - name: Browser consent audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-cookies/screenshots
          cat > qa-cookies/cookies.spec.ts <<'TEST'
          import { test, expect, type BrowserContext, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const reports: Record<string, unknown>[] = [];

          async function open(page: Page, path = "/") {
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(`${BASE}${path}`, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1300);
            expect(errors).toEqual([]);
          }

          async function cookieState(context: BrowserContext) {
            const cookie = (await context.cookies()).find((item) => item.name === "vendzur_cookie_consent");
            if (!cookie) return null;
            return {
              ...cookie,
              decoded: JSON.parse(decodeURIComponent(cookie.value)),
              daysRemaining: (cookie.expires - Date.now() / 1000) / 86400,
            };
          }

          test("first visit, equal choices and essential-only persistence", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(650);
            expect(await page.locator(".cookie-banner").count()).toBe(0);
            await expect(page.locator(".cookie-banner")).toBeVisible({ timeout: 2500 });

            const banner = page.locator(".cookie-banner");
            const actions = banner.locator(".cookie-banner__actions .cookie-button");
            await expect(actions).toHaveCount(2);
            const actionGeometry = await actions.evaluateAll((buttons) =>
              buttons.map((button) => {
                const rect = button.getBoundingClientRect();
                return { width: rect.width, height: rect.height };
              }),
            );
            expect(Math.abs(actionGeometry[0].width - actionGeometry[1].width)).toBeLessThan(2);
            expect(Math.abs(actionGeometry[0].height - actionGeometry[1].height)).toBeLessThan(2);
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("denied");
            expect(await page.evaluate(() => Array.isArray(window.dataLayer))).toBe(false);

            await page.waitForTimeout(2300);
            const teaser = page.locator(".cw-teaser");
            if (await teaser.count()) {
              expect(await teaser.evaluate((element) => getComputedStyle(element).visibility)).toBe("hidden");
            }
            await page.screenshot({ path: "qa-cookies/screenshots/01-banner-desktop.png" });

            await banner.getByRole("button", { name: "Iba nevyhnutné" }).click();
            await expect(banner).toHaveCount(0);
            const saved = await cookieState(context);
            expect(saved?.decoded.analytics).toBe(false);
            expect(saved?.decoded.necessary).toBe(true);
            expect(saved?.daysRemaining).toBeGreaterThan(178);
            expect(saved?.daysRemaining).toBeLessThanOrEqual(180.1);
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("denied");

            await page.reload({ waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1400);
            expect(await page.locator(".cookie-banner").count()).toBe(0);
            reports.push({ test: "essential-only", actionGeometry, saved, passed: true });
            await context.close();
          });

          test("detailed settings, focus trap, analytics grant and withdrawal", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1280, height: 820 } });
            const page = await context.newPage();
            await open(page);
            const banner = page.locator(".cookie-banner");
            await expect(banner).toBeVisible();
            await banner.getByRole("button", { name: /Nastaviť podrobne/ }).click();

            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            expect(await page.evaluate(() => document.body.style.overflow)).toBe("hidden");
            await expect(modal.getByText("Nevyhnutné", { exact: true })).toBeVisible();
            await expect(modal.getByText("Analytické", { exact: true })).toBeVisible();
            await page.screenshot({ path: "qa-cookies/screenshots/02-settings-desktop.png" });

            for (let index = 0; index < 10; index += 1) {
              await page.keyboard.press("Tab");
              expect(
                await page.evaluate(() =>
                  Boolean(document.querySelector(".cookie-modal")?.contains(document.activeElement)),
                ),
              ).toBe(true);
            }

            const analytics = modal.locator(".cookie-switch input");
            await analytics.check();
            await expect(modal.getByText("Povolené", { exact: true })).toBeVisible();
            await modal.getByRole("button", { name: "Uložiť nastavenie" }).click();
            await expect(modal).toHaveCount(0);
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("granted");
            const granted = await cookieState(context);
            expect(granted?.decoded.analytics).toBe(true);
            expect(await page.evaluate(() => Array.isArray(window.dataLayer))).toBe(true);

            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible();
            const beforeEvents = await page.evaluate(() => window.dataLayer?.length ?? 0);
            await launcher.click();
            await page.waitForTimeout(500);
            const panel = page.locator("#chameleon-widget-panel");
            await panel.locator(".cw-chip").first().click();
            await page.waitForTimeout(150);
            const afterEvents = await page.evaluate(() => window.dataLayer?.length ?? 0);
            expect(afterEvents).toBeGreaterThan(beforeEvents);
            await page.getByTestId("widget-close").click();

            const footerSettings = page.getByRole("button", { name: /Nastavenia cookies/ });
            await footerSettings.scrollIntoViewIfNeeded();
            await footerSettings.click();
            await expect(modal).toBeVisible();
            await modal.getByRole("button", { name: "Iba nevyhnutné" }).click();
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("denied");
            const denied = await cookieState(context);
            expect(denied?.decoded.analytics).toBe(false);

            const countBeforeDeniedInteraction = await page.evaluate(() => window.dataLayer?.length ?? 0);
            await launcher.click();
            await page.waitForTimeout(400);
            await page.locator("#chameleon-widget-panel .cw-chip").first().click();
            await page.waitForTimeout(150);
            const countAfterDeniedInteraction = await page.evaluate(() => window.dataLayer?.length ?? 0);
            expect(countAfterDeniedInteraction).toBe(countBeforeDeniedInteraction);
            reports.push({
              test: "grant-withdraw",
              granted,
              denied,
              beforeEvents,
              afterEvents,
              countBeforeDeniedInteraction,
              countAfterDeniedInteraction,
              passed: true,
            });
            await context.close();
          });

          test("settings can close safely before first decision", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1024, height: 768 } });
            const page = await context.newPage();
            await open(page);
            await page.locator(".cookie-banner__settings").click();
            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            await page.keyboard.press("Escape");
            await expect(modal).toHaveCount(0);
            await expect(page.locator(".cookie-banner")).toBeVisible();
            expect(await cookieState(context)).toBeNull();
            reports.push({ test: "safe-close", passed: true });
            await context.close();
          });

          test("mobile banner, settings sheet and widget do not overlap", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true });
            const page = await context.newPage();
            await open(page);
            const banner = page.locator(".cookie-banner");
            await expect(banner).toBeVisible();
            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible();
            const geometry = await page.evaluate(() => {
              const banner = document.querySelector<HTMLElement>(".cookie-banner")!.getBoundingClientRect();
              const launcher = document.querySelector<HTMLElement>("#chameleon-widget-launcher")!.getBoundingClientRect();
              return {
                banner: { top: banner.top, right: banner.right, bottom: banner.bottom, left: banner.left },
                launcher: { top: launcher.top, right: launcher.right, bottom: launcher.bottom, left: launcher.left },
                viewport: { width: innerWidth, height: innerHeight },
              };
            });
            expect(geometry.banner.bottom).toBeLessThanOrEqual(geometry.launcher.top - 4);
            expect(geometry.banner.left).toBeGreaterThanOrEqual(10);
            expect(geometry.banner.right).toBeLessThanOrEqual(geometry.viewport.width - 10);
            await page.screenshot({ path: "qa-cookies/screenshots/03-banner-mobile.png" });

            await banner.locator(".cookie-banner__settings").click();
            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            const modalGeometry = await modal.evaluate((element) => {
              const rect = element.getBoundingClientRect();
              return { top: rect.top, bottom: rect.bottom, width: rect.width, viewport: innerHeight };
            });
            expect(modalGeometry.bottom).toBeGreaterThanOrEqual(modalGeometry.viewport - 1);
            expect(modalGeometry.width).toBeLessThanOrEqual(390);
            await page.screenshot({ path: "qa-cookies/screenshots/04-settings-mobile.png" });
            reports.push({ test: "mobile", geometry, modalGeometry, passed: true });
            await context.close();
          });

          test("cookie policy is reachable and can reopen settings", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1280, height: 820 } });
            await context.addCookies([
              {
                name: "vendzur_cookie_consent",
                value: encodeURIComponent(
                  JSON.stringify({
                    version: 1,
                    necessary: true,
                    analytics: false,
                    updatedAt: new Date().toISOString(),
                  }),
                ),
                url: BASE,
                sameSite: "Lax",
              },
            ]);
            const page = await context.newPage();
            await open(page, "/cookies");
            await expect(page.getByRole("heading", { name: /Jasné pravidlá/ })).toBeVisible();
            await expect(page.getByText("vendzur_cookie_consent", { exact: true })).toBeVisible();
            await expect(page.getByText("180 dní", { exact: true })).toBeVisible();
            await expect(page.getByText("Bez externého analytického poskytovateľa", { exact: true })).toBeVisible();
            await page.getByRole("button", { name: /Otvoriť nastavenia cookies/ }).click();
            await expect(page.locator(".cookie-modal")).toBeVisible();
            await page.screenshot({ path: "qa-cookies/screenshots/05-policy-and-settings.png" });
            reports.push({ test: "policy", passed: true });
            await context.close();
          });

          test.afterAll(() => {
            fs.writeFileSync("qa-cookies/report.json", JSON.stringify(reports, null, 2));
          });
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 45 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-cookies/cookies.spec.ts --workers=1 --reporter=line --timeout=60000 > /tmp/browser.log 2>&1

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cookie-consent-audit-${{ github.run_id }}
          path: qa-cookies
          retention-days: 4

      - name: Save audit result
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "widget=${{ steps.widget.outcome }}"
            echo "widget_ready=${{ steps.widget.outputs.ready }}"
            echo "build=${{ steps.build.outcome }}"
            echo "playwright=${{ steps.playwright.outcome }}"
            echo "browser=${{ steps.browser.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== browser ====="
            cat /tmp/browser.log 2>/dev/null || true
            echo
            echo "===== build ====="
            cat /tmp/build.log 2>/dev/null || true
          } > COOKIE_CONSENT_AUDIT.txt
          echo "${{ github.run_id }}" > COOKIE_CONSENT_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add COOKIE_CONSENT_AUDIT.txt COOKIE_CONSENT_RUN_ID.txt
          git commit -m "chore: ulož cookie consent audit [skip cookie-audit] [skip interaction-audit] [skip final-audit]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
