name: Deploy and verify GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-current-main
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit production dependencies
        run: bun audit --prod --audit-level=high

      - name: Run source and deployment security audit
        run: node scripts/security-audit.mjs

      - name: Lint source
        run: bun run lint

      - name: Run UX and deployment contracts
        run: bun run test

      - name: Build production server
        run: bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/

      - name: Export static Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          PORT=4173 node .output/server/index.mjs > /tmp/vne-n-preview.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..40}; do
            if curl --fail --silent "http://127.0.0.1:4173/vne-n/" > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != true ]; then
            cat /tmp/vne-n-preview.log
            exit 1
          fi

          PAGES_BASE="vne-n" GITHUB_SHA="${GITHUB_SHA}" node scripts/export-github-pages.mjs

      - name: Validate current artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f pages-dist/index.html
          test -f pages-dist/404.html
          test -f pages-dist/build-meta.json
          grep -Fq "Chatboty, ktoré" pages-dist/index.html
          ! grep -Fq "Webové nástroje, ktoré odovzdajú hotový dopyt" pages-dist/index.html
          grep -Fq "${GITHUB_SHA}" pages-dist/build-meta.json

      - name: Upload current Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy current main
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify current live build
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"

          for attempt in {1..30}; do
            HOME_BODY="$(curl --location --fail --silent --show-error --header 'Cache-Control: no-cache' "${BASE}/?sha=${SOURCE_SHA}-${attempt}" || true)"
            META_BODY="$(curl --location --fail --silent --show-error --header 'Cache-Control: no-cache' "${BASE}/build-meta.json?sha=${SOURCE_SHA}-${attempt}" || true)"

            if printf '%s' "$HOME_BODY" | grep -Fq "Chatboty, ktoré" && \
               ! printf '%s' "$HOME_BODY" | grep -Fq "Webové nástroje, ktoré odovzdajú hotový dopyt" && \
               printf '%s' "$META_BODY" | grep -Fq "$SOURCE_SHA"; then
              echo "verified current live build"
              exit 0
            fi

            sleep 5
          done

          echo "Live GitHub Pages is not serving the current main build"
          exit 1
