name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production server
        run: bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Export static Pages artifact
        shell: bash
        run: |
          PORT=4173 node .output/server/index.mjs > /tmp/vne-n-preview.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent "http://127.0.0.1:4173/${{ github.event.repository.name }}/" > /dev/null; then
              break
            fi
            sleep 1
          done

          PAGES_BASE="${{ github.event.repository.name }}" node scripts/export-github-pages.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Let the legacy branch deployment finish
        run: sleep 30

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
