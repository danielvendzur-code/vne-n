name: Deploy and verify GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "MAIN_QUALITY_AUDIT.txt"
      - "PAGES_DEPLOY_AUDIT.txt"
      - "PAGES_WORKFLOW_STATUS.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-current-main
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit production dependencies
        continue-on-error: true
        run: bun audit --prod --audit-level=high

      - name: Run source and deployment security audit
        run: node scripts/security-audit.mjs

      - name: Lint source
        run: bun run lint

      - name: Run UX and deployment contracts
        run: bun run test

      - name: Build production server
        run: bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/

      - name: Export static Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          PORT=4173 node .output/server/index.mjs > /tmp/vne-n-preview.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..40}; do
            if curl --fail --silent "http://127.0.0.1:4173/vne-n/" > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != true ]; then
            cat /tmp/vne-n-preview.log
            exit 1
          fi

          PAGES_BASE="vne-n" GITHUB_SHA="${GITHUB_SHA}" node scripts/export-github-pages.mjs

      - name: Validate exported artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f pages-dist/index.html
          test -f pages-dist/404.html
          test -f pages-dist/preview.html
          test -f pages-dist/widget-loader.js
          test -f pages-dist/build-meta.json
          grep -Fq "Chatboty, ktoré" pages-dist/index.html
          grep -Fq "od 350 €" pages-dist/index.html
          grep -Fq "Čo potrebujem od klienta" pages-dist/index.html
          grep -Fq "Otvoriť aktuálnu stránku" pages-dist/preview.html
          grep -Fq "Content-Security-Policy" pages-dist/index.html
          grep -Fq "DV_ASSISTANT_LOADER_ACTIVE" pages-dist/widget-loader.js
          grep -Fq "competition-winner-v5" pages-dist/widget-loader.js
          grep -Fq "CompetitionWinnerFinal.css" src/components/site/Layout.tsx
          grep -Fq "submitWebsiteLead" src/routes/kontakt.tsx
          ! grep -Fq "Webové nástroje, ktoré odovzdajú hotový dopyt" pages-dist/index.html

          for route in sluzby projekty postup kontakt cookies farby; do
            test -f "pages-dist/${route}/index.html"
            test -f "pages-dist/${route}.html"
          done

          grep -Fq "${GITHUB_SHA}" pages-dist/build-meta.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live deployment and all public routes
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"

          fetch_with_retry() {
            local path="$1"
            local expected="$2"
            local body="/tmp/live-$(echo "$path" | tr '/.' '__').txt"

            for attempt in {1..30}; do
              if curl --location --fail --silent --show-error \
                --header "Cache-Control: no-cache" \
                "${BASE}${path}?verify=${SOURCE_SHA}-${attempt}" > "$body"; then
                if [ -z "$expected" ] || grep -Fq "$expected" "$body"; then
                  echo "verified ${path}"
                  return 0
                fi
              fi
              sleep 5
            done

            echo "Live verification failed for ${path}"
            cat "$body" 2>/dev/null || true
            return 1
          }

          fetch_with_retry "/" "od 350 €"
          fetch_with_retry "/preview.html" "Otvoriť aktuálnu stránku"
          fetch_with_retry "/sluzby" ""
          fetch_with_retry "/sluzby/" ""
          fetch_with_retry "/projekty/" ""
          fetch_with_retry "/postup/" ""
          fetch_with_retry "/kontakt/" "Získať návrh riešenia"
          fetch_with_retry "/cookies/" ""
          fetch_with_retry "/widget-loader.js" "competition-winner-v5"
          fetch_with_retry "/build-meta.json" "$SOURCE_SHA"
          echo "live_smoke=success"

      - name: Checkout latest main for deployment record
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record verified live deployment
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          {
            echo "deployment=success"
            echo "dependency_audit=checked_nonblocking"
            echo "source_security_audit=success"
            echo "live_smoke=success"
            echo "source_sha=${SOURCE_SHA}"
            echo "page_url=${PAGE_URL}"
            echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_DEPLOY_AUDIT.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOY_AUDIT.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record verified Pages deployment [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main

  diagnostics:
    if: ${{ always() && github.actor != 'github-actions[bot]' }}
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main for workflow status
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record workflow outcome
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          {
            echo "source_sha=${SOURCE_SHA}"
            echo "run_id=${RUN_ID}"
            echo "build_result=${BUILD_RESULT}"
            echo "deploy_result=${DEPLOY_RESULT}"
            echo "recorded_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_WORKFLOW_STATUS.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_WORKFLOW_STATUS.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record Pages workflow outcome [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
