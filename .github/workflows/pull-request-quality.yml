name: Pull request quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run source and deployment security audit
        id: security_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/security-audit.mjs 2>&1 | tee security-audit.log

      - name: Upload security audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-log
          path: security-audit.log
          if-no-files-found: error
          retention-days: 3

      - name: Lint source
        run: bun run lint

      - name: Run UX and deployment contracts
        run: bun run test

      - name: Build production server
        run: bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/

      - name: Enforce security audit result
        if: steps.security_audit.outcome == 'failure'
        run: exit 1
