name: Pull request quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format changed source canonically
        run: |
          bunx prettier --write \
            src/components/site/CompetitionLanding.tsx \
            src/components/site/Layout.tsx \
            scripts/security-audit.mjs \
            tests/home-contract.test.mjs

      - name: Commit canonical formatting
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git add \
            src/components/site/CompetitionLanding.tsx \
            src/components/site/Layout.tsx \
            scripts/security-audit.mjs \
            tests/home-contract.test.mjs
          if git diff --cached --quiet; then
            echo "source already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style: format competition redesign"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Run source and deployment security audit
        id: security_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/security-audit.mjs 2>&1 | tee security-audit.log

      - name: Lint source
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee lint.log

      - name: Run UX and deployment contracts
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bun run test 2>&1 | tee test.log

      - name: Build production server
        id: build
        continue-on-error: true
        shell: bash
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/
        run: |
          set -o pipefail
          bun run build 2>&1 | tee build.log

      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            security-audit.log
            lint.log
            test.log
            build.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce quality results
        if: always()
        shell: bash
        run: |
          failed=0
          if [ "${{ steps.security_audit.outcome }}" != "success" ]; then
            echo "security audit failed"
            failed=1
          fi
          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "lint failed"
            failed=1
          fi
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "tests failed"
            failed=1
          fi
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "build failed"
            failed=1
          fi
          exit "$failed"
