name: Format current homepage files

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/format-current-homepage.yml

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Format changed source files
        run: |
          bunx prettier --write \
            src/components/site/RequestedRuntimePolish.tsx \
            src/components/site/SiteMotionEnhancements.tsx \
            src/hooks/useMagnetic.ts \
            src/routes/index.tsx \
            tests/home-contract.test.mjs
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/site/RequestedRuntimePolish.tsx src/components/site/SiteMotionEnhancements.tsx src/hooks/useMagnetic.ts src/routes/index.tsx tests/home-contract.test.mjs
          git commit -m "style: format homepage changes [skip main-quality]" || exit 0
          git push origin HEAD:main
