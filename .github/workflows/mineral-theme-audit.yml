name: Mineral theme audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

concurrency:
  group: mineral-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: ${{ !contains(github.event.head_commit.message, '[skip mineral]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: bun install > /tmp/install.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1

      - name: Node server build
        id: node_build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/node-build.log 2>&1

      - name: Install Playwright
        id: playwright
        continue-on-error: true
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright.log 2>&1

      - name: Browser screenshots and interaction audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-mineral/screenshots
          cat > qa-mineral/mineral.spec.ts <<'TEST'
          import { test, expect, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const report: Record<string, unknown>[] = [];
          const routes = [
            { path: "/", name: "home" },
            { path: "/sluzby", name: "sluzby" },
            { path: "/projekty/", name: "projekty" },
            { path: "/projekty/ukazka-01", name: "projekt-detail" },
            { path: "/postup", name: "postup" },
            { path: "/kontakt", name: "kontakt" },
          ];
          const forbiddenColors = [
            "201, 170, 112",
            "188, 115, 82",
            "196, 124, 94",
            "127, 165, 143",
            "50, 211, 162",
            "18, 44, 33",
            "23, 53, 42",
            "9, 26, 20",
          ];

          function expectNoOldColors(value: string) {
            for (const oldColor of forbiddenColors) expect(value).not.toContain(oldColor);
          }

          async function revealPage(page: Page) {
            const height = await page.evaluate(() => document.documentElement.scrollHeight);
            const viewport = page.viewportSize()?.height ?? 800;
            for (let top = 0; top < height; top += Math.max(320, Math.floor(viewport * 0.72))) {
              await page.evaluate((nextTop) => window.scrollTo({ top: nextTop, behavior: "auto" }), top);
              await page.waitForTimeout(85);
            }
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "auto" }));
            await page.waitForTimeout(420);
          }

          async function auditPage(page: Page, path: string) {
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(`${BASE}${path}`, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(900);
            await revealPage(page);
            const metrics = await page.evaluate(() => {
              const style = getComputedStyle(document.documentElement);
              const residueSelectors = [
                ".glide-field",
                ".sp-service",
                ".sp-combine",
                ".sp-cta",
                ".contact-page",
                ".contact-card",
                ".derat-story",
              ];
              const residueStyles = residueSelectors
                .map((selector) => document.querySelector(selector))
                .filter((element): element is Element => Boolean(element))
                .map((element) => {
                  const computed = getComputedStyle(element);
                  return `${computed.backgroundColor} ${computed.backgroundImage}`;
                })
                .join(" ");
              const glide = document.querySelector(".glide-field");
              const derat = document.querySelector(".derat-story");
              return {
                scrollWidth: document.documentElement.scrollWidth,
                clientWidth: document.documentElement.clientWidth,
                primary: style.getPropertyValue("--primary").trim(),
                background: style.getPropertyValue("--background").trim(),
                glideSecondary: glide
                  ? getComputedStyle(glide).getPropertyValue("--glide-secondary").trim()
                  : null,
                deratAccent: derat
                  ? getComputedStyle(derat).getPropertyValue("--derat-mint").trim()
                  : null,
                residueStyles,
              };
            });
            expect(metrics.scrollWidth).toBeLessThanOrEqual(metrics.clientWidth + 1);
            expect(metrics.primary.toLowerCase()).toBe("#7bcbe3");
            expect(metrics.background.toLowerCase()).toBe("#071116");
            if (metrics.glideSecondary) expect(metrics.glideSecondary).toBe("95 145 181");
            if (metrics.deratAccent) expect(metrics.deratAccent.toLowerCase()).toBe("#7bcbe3");
            expectNoOldColors(metrics.residueStyles);
            expect(errors).toEqual([]);
            return { metrics, errors };
          }

          for (const route of routes) {
            for (const viewport of [
              { label: "desktop", width: 1440, height: 900 },
              { label: "mobile", width: 390, height: 844 },
            ]) {
              test(`${route.name} ${viewport.label}`, async ({ browser }) => {
                const context = await browser.newContext({
                  viewport: { width: viewport.width, height: viewport.height },
                  reducedMotion: "no-preference",
                });
                const page = await context.newPage();
                const result = await auditPage(page, route.path);
                await page.screenshot({
                  path: `qa-mineral/screenshots/${route.name}-${viewport.label}.png`,
                  fullPage: true,
                });
                report.push({ route: route.path, viewport, ...result });
                await context.close();
              });
            }
          }

          test("hero selectors and comparison states", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await auditPage(page, "/");

            const heroButtons = page.locator(".lp-assistant-chips button");
            expect(await heroButtons.count()).toBe(3);
            await heroButtons.nth(1).click();
            await page.waitForTimeout(420);
            expect(await heroButtons.nth(1).getAttribute("data-active")).toBe("true");
            await page.screenshot({ path: "qa-mineral/screenshots/hero-calculator-active.png" });

            await page.locator(".lp-comparison").scrollIntoViewIfNeeded();
            await page.waitForTimeout(300);
            const switchButtons = page.locator(".lp-switch button");
            expect(await switchButtons.count()).toBe(2);
            await switchButtons.nth(0).click();
            await page.waitForTimeout(420);
            await page.screenshot({ path: "qa-mineral/screenshots/comparison-without.png" });
            await switchButtons.nth(1).click();
            await page.waitForTimeout(420);
            await page.screenshot({ path: "qa-mineral/screenshots/comparison-with.png" });

            report.push({ interaction: "hero-and-comparison", passed: true });
            await context.close();
          });

          test("capability chips expanded", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await auditPage(page, "/");
            const caps = page.locator(".lp-caps");
            await caps.scrollIntoViewIfNeeded();
            await page.waitForTimeout(420);
            const firstChip = page.locator(".lp-caps-row").first().locator(".lp-chip").first();
            await firstChip.click();
            await page.waitForTimeout(520);
            expect(await firstChip.getAttribute("data-active")).toBe("true");
            await page.screenshot({ path: "qa-mineral/screenshots/capability-expanded.png" });
            report.push({ interaction: "capability-chip", passed: true });
            await context.close();
          });

          test("mobile hero controls and menu palette", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
            const page = await context.newPage();
            await auditPage(page, "/");
            const heroButtons = page.locator(".lp-assistant-chips button");
            const boxes = await heroButtons.evaluateAll((buttons) =>
              buttons.map((button) => {
                const box = button.getBoundingClientRect();
                return { width: box.width, top: box.top };
              }),
            );
            expect(boxes).toHaveLength(3);
            expect(boxes[0].width).toBeGreaterThan(240);
            expect(boxes[1].top).toBeGreaterThan(boxes[0].top);
            expect(boxes[2].top).toBeGreaterThan(boxes[1].top);
            await page.screenshot({ path: "qa-mineral/screenshots/mobile-hero-controls.png" });

            await page.getByRole("button", { name: "Otvoriť menu" }).click();
            await page.waitForTimeout(700);
            await expect(page.locator(".site-menu-drawer")).toBeVisible();
            await page.screenshot({ path: "qa-mineral/screenshots/mobile-menu-open.png" });
            report.push({ interaction: "mobile-controls-and-menu", passed: true, boxes });
            await context.close();
          });

          test("external assistant chat and calculator palette", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
            const page = await context.newPage();
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(2300);

            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible();
            const launcherMetrics = await launcher.evaluate((element) => {
              const style = getComputedStyle(element);
              const stops = [...element.querySelectorAll('linearGradient[id$="-body"] stop')].map(
                (stop) => getComputedStyle(stop).stopColor,
              );
              return {
                background: `${style.backgroundColor} ${style.backgroundImage}`,
                border: style.borderColor,
                stops,
              };
            });
            expectNoOldColors(`${launcherMetrics.background} ${launcherMetrics.border} ${launcherMetrics.stops.join(" ")}`);
            expect(launcherMetrics.stops).toContain("rgb(163, 221, 236)");
            expect(launcherMetrics.stops).toContain("rgb(123, 203, 227)");

            await launcher.evaluate((button: HTMLButtonElement) => button.click());
            const panel = page.locator("#chameleon-widget-panel");
            await expect(panel).toBeVisible();
            await page.waitForTimeout(650);

            const chatMetrics = await panel.evaluate((element) => {
              const selectors = [
                ".cw-panel-head",
                ".cw-panel-head__mascot",
                ".cw-panel-head__context",
                ".cw-panel-head__beam",
                ".cw-tabs",
                ".cw-tabs__glass",
                ".cw-message-wrap p",
                ".cw-chip",
                ".cw-chip--primary",
                ".cw-inputbar input",
                ".cw-inputbar > button",
              ];
              const styles = selectors
                .map((selector) => element.querySelector(selector))
                .filter((item): item is Element => Boolean(item))
                .map((item) => {
                  const style = getComputedStyle(item);
                  return `${style.color} ${style.backgroundColor} ${style.backgroundImage} ${style.borderColor} ${style.boxShadow}`;
                })
                .join(" ");
              const panelStyle = getComputedStyle(element);
              const bodyStops = [...element.querySelectorAll('linearGradient[id$="-body"] stop')].map(
                (stop) => getComputedStyle(stop).stopColor,
              );
              return {
                panel: `${panelStyle.color} ${panelStyle.backgroundColor} ${panelStyle.backgroundImage} ${panelStyle.borderColor}`,
                styles,
                bodyStops,
              };
            });
            expectNoOldColors(`${chatMetrics.panel} ${chatMetrics.styles} ${chatMetrics.bodyStops.join(" ")}`);
            await page.screenshot({ path: "qa-mineral/screenshots/widget-chat-mineral.png" });

            const tabs = page.locator(".cw-tabs button");
            expect(await tabs.count()).toBe(2);
            await page.getByTestId("tab-calculator").click();
            await page.waitForTimeout(650);
            expect(await page.locator(".cw-tabs").getAttribute("data-mode")).toBe("calculator");
            await expect(page.locator(".cw-calculator")).toBeVisible();

            const calculatorMetrics = await panel.evaluate((element) => {
              const selectors = [
                ".cw-tabs",
                ".cw-tabs__glass",
                ".cw-progress__back",
                ".cw-progress__track",
                ".cw-progress__fill",
                ".cw-progress__count",
                ".cw-rows",
                ".cw-list",
                ".cw-grid",
                ".cw-rowcard",
                ".cw-scard",
                ".cw-opt",
                ".cw-vcard",
                ".cw-summary",
                ".cw-submit",
                ".cw-next",
              ];
              return selectors
                .map((selector) => element.querySelector(selector))
                .filter((item): item is Element => Boolean(item))
                .map((item) => {
                  const style = getComputedStyle(item);
                  return `${style.color} ${style.backgroundColor} ${style.backgroundImage} ${style.borderColor} ${style.boxShadow}`;
                })
                .join(" ");
            });
            expectNoOldColors(calculatorMetrics);
            await page.screenshot({ path: "qa-mineral/screenshots/widget-calculator-mineral.png" });
            expect(errors).toEqual([]);
            report.push({
              interaction: "external-widget",
              launcherMetrics,
              chatMetrics,
              calculatorMetrics,
              passed: true,
            });
            await context.close();
          });

          test.afterAll(() => {
            fs.writeFileSync("qa-mineral/browser-report.json", JSON.stringify(report, null, 2));
          });
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 40 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-mineral/mineral.spec.ts --workers=1 --reporter=line > /tmp/browser.log 2>&1

      - name: GitHub Pages build
        id: pages_build
        continue-on-error: true
        env:
          VITE_BASE_PATH: /vne-n/
          NITRO_PRESET: node-server
        run: bun run build > /tmp/pages-build.log 2>&1

      - name: GitHub Pages export
        id: pages_export
        continue-on-error: true
        shell: bash
        run: |
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/pages-server.log 2>&1 &
          PAGES_PID=$!
          trap 'kill $PAGES_PID 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then break; fi
            if [ "$attempt" -eq 40 ]; then cat /tmp/pages-server.log; exit 1; fi
            sleep 1
          done
          PAGES_BASE=vne-n node scripts/export-github-pages.mjs > /tmp/pages-export.log 2>&1

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mineral-theme-${{ github.run_id }}
          path: qa-mineral
          retention-days: 3

      - name: Write result to branch
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "install=${{ steps.install.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "node_build=${{ steps.node_build.outcome }}"
            echo "playwright=${{ steps.playwright.outcome }}"
            echo "browser=${{ steps.browser.outcome }}"
            echo "pages_build=${{ steps.pages_build.outcome }}"
            echo "pages_export=${{ steps.pages_export.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== browser ====="
            cat /tmp/browser.log 2>/dev/null || true
            echo
            echo "===== node-build ====="
            cat /tmp/node-build.log 2>/dev/null || true
            echo
            echo "===== pages-build ====="
            cat /tmp/pages-build.log 2>/dev/null || true
            echo
            echo "===== pages-export ====="
            cat /tmp/pages-export.log 2>/dev/null || true
          } > MINERAL_AUDIT_RESULT.txt
          echo "${{ github.run_id }}" > MINERAL_AUDIT_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MINERAL_AUDIT_RESULT.txt MINERAL_AUDIT_RUN_ID.txt
          git commit -m "chore: ulož výsledok mineral auditu [skip mineral] [skip widget]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
