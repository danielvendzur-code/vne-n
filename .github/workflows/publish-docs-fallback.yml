name: Publish current build to docs fallback

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-docs-fallback.yml

permissions:
  contents: write

jobs:
  publish:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun audit --prod --audit-level=high
      - run: node scripts/security-audit.mjs
      - run: bun run lint
      - run: bun run test
      - name: Build current site
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/
        run: bun run build
      - name: Export static site
        shell: bash
        run: |
          set -euo pipefail
          PORT=4173 node .output/server/index.mjs > /tmp/vne-n-docs.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/vne-n/ > /dev/null; then
              break
            fi
            sleep 1
          done
          PAGES_BASE=vne-n GITHUB_SHA="$GITHUB_SHA" node scripts/export-github-pages.mjs
      - name: Replace docs with verified artifact
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R pages-dist/. docs/
          touch docs/.nojekyll
          grep -Fq "Chatboty, ktoré" docs/index.html
          ! grep -Fq "Webové nástroje, ktoré odovzdajú hotový dopyt" docs/index.html
          test -f docs/build-meta.json
      - name: Commit docs fallback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "deploy: publish current verified site to docs [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
