name: Font URL debug

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

jobs:
  fetch:
    if: ${{ !contains(github.event.head_commit.message, '[skip font]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Google Fonts CSS
        shell: bash
        run: |
          curl -fsSL \
            -A 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/140 Safari/537.36' \
            'https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..800&display=swap' \
            > FONT_CSS.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FONT_CSS.txt
          git commit -m "chore: ulož CSS fontu [skip font] [skip audit] [skip landing cls]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
