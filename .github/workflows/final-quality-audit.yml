name: Final quality audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

concurrency:
  group: final-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip final-quality]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for current public widget
        id: widget
        continue-on-error: true
        shell: bash
        run: |
          ready=false
          for attempt in {1..100}; do
            SOURCE=$(curl -fsS "https://danielvendzur-code.github.io/moj.chatbot.backend/widget.js?final-quality=${GITHUB_RUN_ID}-${attempt}" || true)
            if echo "$SOURCE" | grep -q "widgetDragReady" \
              && echo "$SOURCE" | grep -q "horizontalDrag" \
              && echo "$SOURCE" | grep -q "analyticsConsent" \
              && echo "$SOURCE" | grep -q "Čo by pomohlo vášmu webu"; then
              ready=true
              break
            fi
            sleep 2
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
          test "$ready" = true

      - name: Install
        id: install
        continue-on-error: true
        run: bun install > /tmp/install.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1

      - name: Build
        id: build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/build.log 2>&1

      - name: Install Playwright
        id: playwright
        continue-on-error: true
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright.log 2>&1

      - name: Browser and visual audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-final-quality/screenshots
          cat > qa-final-quality/final-quality.spec.ts <<'TEST'
          import { test, expect, type BrowserContext, type Locator, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const report: Record<string, unknown>[] = [];
          const screenshotDir = "qa-final-quality/screenshots";

          test.setTimeout(90_000);

          const consentValue = (analytics = false) =>
            encodeURIComponent(
              JSON.stringify({
                version: 1,
                necessary: true,
                analytics,
                updatedAt: new Date().toISOString(),
              }),
            );

          async function seedConsent(context: BrowserContext, analytics = false) {
            await context.addCookies([
              {
                name: "vendzur_cookie_consent",
                value: consentValue(analytics),
                url: BASE,
                sameSite: "Lax",
              },
            ]);
          }

          async function open(page: Page, path = "/", settle = 1100) {
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(`${BASE}${path}`, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(settle);
            expect(errors).toEqual([]);
            const overflow = await page.evaluate(() =>
              document.documentElement.scrollWidth - document.documentElement.clientWidth,
            );
            expect(overflow).toBeLessThanOrEqual(1);
          }

          async function drag(locator: Locator, fromRatio: number, toRatio: number) {
            const box = await locator.boundingBox();
            if (!box) throw new Error("Missing drag target");
            const y = box.y + box.height / 2;
            await locator.page().mouse.move(box.x + box.width * fromRatio, y);
            await locator.page().mouse.down();
            await locator.page().mouse.move(box.x + box.width * toRatio, y, { steps: 14 });
            await locator.page().mouse.up();
          }

          async function screenshot(page: Page, name: string, fullPage = false) {
            await page.screenshot({
              path: `${screenshotDir}/${name}.png`,
              fullPage,
              animations: "allow",
            });
          }

          test("cookie consent: first visit, settings, persistence and withdrawal", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1280, height: 820 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(600);
            expect(await page.locator(".cookie-banner").count()).toBe(0);
            const banner = page.locator(".cookie-banner");
            await expect(banner).toBeVisible({ timeout: 2400 });
            await expect(banner.getByRole("button", { name: "Prijať všetko" })).toBeVisible();
            await expect(banner.getByRole("button", { name: "Iba nevyhnutné" })).toBeVisible();
            const buttons = await banner.locator(".cookie-banner__actions button").evaluateAll((items) =>
              items.map((item) => {
                const rect = item.getBoundingClientRect();
                return { width: rect.width, height: rect.height };
              }),
            );
            expect(Math.abs(buttons[0].width - buttons[1].width)).toBeLessThan(2);
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("denied");
            expect(await page.evaluate(() => Array.isArray(window.dataLayer))).toBe(false);
            await screenshot(page, "01-cookie-banner-desktop");

            await banner.getByRole("button", { name: /Nastaviť podrobne/ }).click();
            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            expect(await page.evaluate(() => document.body.style.overflow)).toBe("hidden");
            for (let index = 0; index < 8; index += 1) {
              await page.keyboard.press("Tab");
              expect(
                await page.evaluate(() =>
                  Boolean(document.querySelector(".cookie-modal")?.contains(document.activeElement)),
                ),
              ).toBe(true);
            }
            await modal.locator(".cookie-switch input").check();
            await modal.getByRole("button", { name: "Uložiť nastavenie" }).click();
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("granted");
            expect(await page.evaluate(() => Array.isArray(window.dataLayer))).toBe(true);
            const saved = (await context.cookies()).find((cookie) => cookie.name === "vendzur_cookie_consent");
            expect(saved).toBeTruthy();
            const savedValue = JSON.parse(decodeURIComponent(saved!.value));
            expect(savedValue.analytics).toBe(true);
            expect((saved!.expires - Date.now() / 1000) / 86400).toBeGreaterThan(178);

            await page.reload({ waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1200);
            expect(await page.locator(".cookie-banner").count()).toBe(0);
            const footerButton = page.getByRole("button", { name: /Nastavenia cookies/ });
            await footerButton.scrollIntoViewIfNeeded();
            await footerButton.click();
            await expect(modal).toBeVisible();
            await modal.getByRole("button", { name: "Iba nevyhnutné" }).click();
            expect(await page.locator("html").getAttribute("data-analytics-consent")).toBe("denied");
            const withdrawn = (await context.cookies()).find(
              (cookie) => cookie.name === "vendzur_cookie_consent",
            );
            expect(JSON.parse(decodeURIComponent(withdrawn!.value)).analytics).toBe(false);

            await open(page, "/cookies", 800);
            await expect(page.getByText("vendzur_cookie_consent", { exact: true })).toBeVisible();
            await expect(page.getByText("180 dní", { exact: true })).toBeVisible();
            await expect(
              page.getByText("Bez externého analytického poskytovateľa", { exact: true }),
            ).toBeVisible();
            await screenshot(page, "02-cookie-policy", true);
            report.push({ test: "cookies", buttons, savedValue, passed: true });
            await context.close();
          });

          test("desktop hero, chips, hover effects and menu", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            await seedConsent(context);
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(120);
            await screenshot(page, "03-hero-120ms");
            await page.waitForTimeout(500);
            await screenshot(page, "04-hero-620ms");
            await page.waitForTimeout(850);
            await screenshot(page, "05-hero-final");

            await expect(page.locator(".site-brand-lockup")).toContainText("Daniel Vendžúr");
            const heroLines = await page.locator(".lp-hero-line > *").evaluateAll((items) =>
              items.map((item) => Number.parseFloat(getComputedStyle(item).opacity)),
            );
            expect(heroLines.every((opacity) => opacity > 0.98)).toBe(true);

            const card = page.locator(".lp-assistant-card");
            const cardBox = await card.boundingBox();
            if (!cardBox) throw new Error("Hero card missing");
            const beforeTilt = await card.evaluate((element) => getComputedStyle(element).transform);
            await page.mouse.move(cardBox.x + cardBox.width * 0.83, cardBox.y + cardBox.height * 0.2);
            await page.waitForTimeout(170);
            const tilt = await card.evaluate((element) => getComputedStyle(element).transform);
            expect(tilt).not.toBe(beforeTilt);
            await screenshot(page, "06-hero-tilt");
            await page.mouse.move(25, 820);
            await page.waitForTimeout(500);

            const selector = page.locator(".lp-assistant-chips");
            const second = selector.locator("button").nth(1);
            const secondBox = await second.boundingBox();
            if (!secondBox) throw new Error("Hero selector missing");
            await page.mouse.move(secondBox.x + secondBox.width * 0.8, secondBox.y + secondBox.height * 0.25);
            await page.waitForTimeout(100);
            expect(await second.evaluate((element) => element.style.getPropertyValue("--liquid-x"))).not.toBe("");
            await drag(selector, 0.17, 0.84);
            await page.waitForTimeout(480);
            const active = selector.locator("button").nth(2);
            expect(await active.getAttribute("data-active")).toBe("true");
            const fill = await active.locator(".lp-chip-liquid").evaluate((element) => {
              const style = getComputedStyle(element);
              const matrix = new DOMMatrixReadOnly(style.transform);
              const width = element.getBoundingClientRect().width;
              const originX = Number.parseFloat(style.transformOrigin);
              return { translateX: matrix.e, scaleX: matrix.a, width, originX };
            });
            expect(Math.abs(fill.translateX)).toBeLessThan(0.5);
            expect(fill.scaleX).toBeGreaterThan(0.95);
            expect(Math.abs(fill.originX - fill.width / 2)).toBeLessThan(1.5);

            await page.getByRole("button", { name: "Otvoriť menu" }).click();
            const drawer = page.locator("#site-navigation-drawer");
            await page.waitForTimeout(120);
            await screenshot(page, "07-menu-opening");
            await page.waitForTimeout(650);
            await expect(drawer.locator(".rb-line-sidebar__text")).toHaveCount(5);
            await expect(drawer.locator(".site-menu-solution")).toHaveCount(3);
            const menuMetrics = await drawer.evaluate((element) => ({
              width: element.getBoundingClientRect().width,
              overflow: element.scrollWidth - element.clientWidth,
              height: element.getBoundingClientRect().height,
            }));
            expect(menuMetrics.width).toBeGreaterThan(650);
            expect(menuMetrics.overflow).toBeLessThanOrEqual(1);
            await drawer.locator(".site-menu-solution").first().hover();
            await page.waitForTimeout(220);
            await screenshot(page, "08-menu-final-hover");
            await page.keyboard.press("Escape");
            await page.waitForTimeout(500);
            await expect(drawer).not.toBeVisible();
            report.push({ test: "desktop-hero-menu", heroLines, fill, menuMetrics, passed: true });
            await context.close();
          });

          test("home interaction sections and scroll story", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            await seedConsent(context);
            const page = await context.newPage();
            await open(page);

            const comparison = page.locator(".lp-comparison");
            await comparison.scrollIntoViewIfNeeded();
            await page.waitForTimeout(650);
            const initialHeight = await comparison.evaluate((element) => element.getBoundingClientRect().height);
            await comparison.getByRole("button", { name: "Bez nástroja" }).click();
            await page.waitForTimeout(430);
            await drag(comparison.locator(".lp-switch"), 0.2, 0.8);
            await page.waitForTimeout(430);
            expect(await comparison.getByRole("button", { name: "S nástrojom" }).getAttribute("data-active")).toBe(
              "true",
            );
            const finalHeight = await comparison.evaluate((element) => element.getBoundingClientRect().height);
            expect(Math.abs(finalHeight - initialHeight)).toBeLessThan(80);
            await screenshot(page, "09-comparison");

            const capabilities = page.locator(".lp-caps");
            await capabilities.scrollIntoViewIfNeeded();
            await page.waitForTimeout(650);
            const chips = capabilities.locator(".lp-chip");
            await chips.first().click();
            await page.waitForTimeout(480);
            await expect(capabilities.locator(".lp-caps-detail").first()).toBeVisible();
            await chips.nth(1).click();
            await page.waitForTimeout(480);
            expect(await chips.nth(1).getAttribute("data-active")).toBe("true");
            await screenshot(page, "10-capability-detail");

            const story = page.locator(".derat-story");
            const storyBox = await story.boundingBox();
            if (!storyBox) throw new Error("Story missing");
            const states: number[][] = [];
            for (const [index, ratio] of [0.08, 0.36, 0.64, 0.9].entries()) {
              await page.evaluate(
                ({ y, height, ratio }) => window.scrollTo(0, y + height * ratio - 180),
                { y: storyBox.y, height: storyBox.height, ratio },
              );
              await page.waitForTimeout(700);
              const opacities = await story.locator("[data-derat-frame]").evaluateAll((items) =>
                items.map((item) => Number.parseFloat(getComputedStyle(item).opacity)),
              );
              expect(Math.max(...opacities)).toBeGreaterThan(0.78);
              expect(opacities.filter((opacity) => opacity > 0.45).length).toBeLessThanOrEqual(2);
              states.push(opacities);
              await screenshot(page, `11-story-${index + 1}`);
            }

            const faq = page.locator(".lp-faq");
            await faq.scrollIntoViewIfNeeded();
            await page.waitForTimeout(550);
            const item = faq.locator(".lp-faq-item").first();
            await item.getByRole("button").click();
            await page.waitForTimeout(450);
            await expect(item.locator(".lp-faq-body")).toBeVisible();
            await screenshot(page, "15-faq-open");
            report.push({ test: "sections", initialHeight, finalHeight, states, passed: true });
            await context.close();
          });

          test("widget preview, chat drag and complete calculator flow", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 430, height: 860 } });
            await seedConsent(context);
            const page = await context.newPage();
            const startedAt = Date.now();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible({ timeout: 7000 });
            expect(await page.locator(".cw-teaser").count()).toBe(0);
            const teaser = page.locator(".cw-teaser");
            await expect(teaser).toBeVisible({ timeout: 6000 });
            const teaserDelay = Date.now() - startedAt;
            expect(teaserDelay).toBeGreaterThanOrEqual(2700);
            expect(teaserDelay).toBeLessThan(6500);
            await screenshot(page, "16-widget-preview");
            await teaser.getByRole("button", { name: "Zavrieť tip" }).click();

            await launcher.click();
            const panel = page.locator("#chameleon-widget-panel");
            await expect(panel).toBeVisible();
            const replies = panel.locator(".cw-quick-replies");
            await expect(replies).toHaveAttribute("data-horizontal-drag", "true");
            const replyMetrics = await replies.evaluate((element) => ({
              scrollWidth: element.scrollWidth,
              clientWidth: element.clientWidth,
              touchAction: getComputedStyle(element).touchAction,
            }));
            expect(replyMetrics.touchAction).toContain("pan-y");
            await replies.locator(".cw-chip").first().click();
            await expect(panel.locator(".cw-message-row--me")).toHaveCount(1);
            await screenshot(page, "17-widget-chat");

            const tabs = panel.locator(".cw-tabs");
            await drag(tabs, 0.78, 0.22);
            await page.waitForTimeout(620);
            await expect(panel.locator(".cw-calculator")).toBeVisible();
            const rows = panel.locator(".cw-rows");
            await expect(rows).toHaveAttribute("data-widget-drag-ready", "true");
            const rowMetrics = await rows.evaluate((element) => ({
              scrollWidth: element.scrollWidth,
              clientWidth: element.clientWidth,
              touchAction: getComputedStyle(element).touchAction,
            }));
            expect(rowMetrics.scrollWidth).toBeGreaterThan(rowMetrics.clientWidth);
            expect(rowMetrics.touchAction).toContain("pan-y");
            const before = await rows.evaluate((element) => element.scrollLeft);
            await drag(rows, 0.84, 0.2);
            await page.waitForTimeout(140);
            expect(await rows.evaluate((element) => element.scrollLeft)).toBeGreaterThan(before + 20);
            const card = rows.locator(".cw-rowcard").nth(1);
            await card.click();
            await page.waitForTimeout(360);
            expect(await card.getAttribute("data-selected")).toBe("true");
            await screenshot(page, "18-calculator-step-one");

            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(650);
            await panel.locator(".cw-scard").first().click();
            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(650);
            await panel.locator(".cw-opt").first().click();
            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(650);
            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(650);
            await panel.locator(".cw-vcard").first().click();
            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(650);
            await panel.locator(".cw-vcard").first().click();
            await panel.getByTestId("flow-next").click();
            await page.waitForTimeout(700);
            await screenshot(page, "19-calculator-contact");

            await panel.getByTestId("lead-submit").click();
            await expect(panel.getByRole("alert")).toContainText("meno a e-mail");
            await panel.getByRole("textbox", { name: "Meno a priezvisko" }).fill("Test Používateľ");
            await panel.getByRole("textbox", { name: "E-mail" }).fill("test@example.com");
            await panel.locator(".cw-consent input").check();
            await panel.getByTestId("lead-submit").click();
            await expect(panel.locator(".cw-thanks")).toBeVisible({ timeout: 3000 });
            await screenshot(page, "20-calculator-complete");
            report.push({ test: "widget", teaserDelay, replyMetrics, rowMetrics, passed: true });
            await context.close();
          });

          test("mobile layout, touch drag and reduced motion", async ({ browser }) => {
            const mobileContext = await browser.newContext({
              viewport: { width: 390, height: 844 },
              hasTouch: true,
              isMobile: true,
            });
            await seedConsent(mobileContext);
            const page = await mobileContext.newPage();
            await open(page);
            const selector = page.locator(".lp-assistant-chips");
            const box = await selector.boundingBox();
            if (!box) throw new Error("Mobile selector missing");
            const y = box.y + box.height / 2;
            await selector.dispatchEvent("pointerdown", {
              pointerId: 7,
              pointerType: "touch",
              isPrimary: true,
              clientX: box.x + box.width * 0.18,
              clientY: y,
              bubbles: true,
            });
            await selector.dispatchEvent("pointermove", {
              pointerId: 7,
              pointerType: "touch",
              isPrimary: true,
              clientX: box.x + box.width * 0.82,
              clientY: y,
              bubbles: true,
            });
            await selector.dispatchEvent("pointerup", {
              pointerId: 7,
              pointerType: "touch",
              isPrimary: true,
              clientX: box.x + box.width * 0.82,
              clientY: y,
              bubbles: true,
            });
            await page.waitForTimeout(450);
            expect(await selector.locator("button").nth(2).getAttribute("data-active")).toBe("true");

            await page.getByRole("button", { name: "Otvoriť menu" }).click();
            await page.waitForTimeout(700);
            const drawer = page.locator("#site-navigation-drawer");
            const menuOverflow = await drawer.evaluate((element) =>
              element.scrollWidth - element.clientWidth,
            );
            expect(menuOverflow).toBeLessThanOrEqual(1);
            await screenshot(page, "21-mobile-menu");
            await page.getByRole("button", { name: "Zavrieť menu" }).click();

            const story = page.locator(".derat-story");
            await story.scrollIntoViewIfNeeded();
            await page.waitForTimeout(650);
            await story.locator(".derat-story__dots button").nth(2).click();
            await page.waitForTimeout(750);
            expect(await story.locator(".derat-story__dots button").nth(2).getAttribute("data-active")).toBe(
              "true",
            );
            await screenshot(page, "22-mobile-story");
            await mobileContext.close();

            const reducedContext = await browser.newContext({
              viewport: { width: 1440, height: 900 },
              reducedMotion: "reduce",
            });
            await seedConsent(reducedContext);
            const reducedPage = await reducedContext.newPage();
            await open(reducedPage, "/", 220);
            expect(await reducedPage.locator(".lp-progress").count()).toBe(0);
            const visibility = await reducedPage.evaluate(() => ({
              lines: Array.from(document.querySelectorAll<HTMLElement>(".lp-hero-line > *")).map(
                (item) => Number.parseFloat(getComputedStyle(item).opacity),
              ),
              stage: Number.parseFloat(
                getComputedStyle(document.querySelector<HTMLElement>(".lp-hero-stage")!).opacity,
              ),
            }));
            expect(visibility.lines.every((opacity) => opacity > 0.98)).toBe(true);
            expect(visibility.stage).toBeGreaterThan(0.98);
            await screenshot(reducedPage, "23-reduced-motion");
            report.push({ test: "mobile-reduced", menuOverflow, visibility, passed: true });
            await reducedContext.close();
          });

          test.afterAll(() => {
            fs.writeFileSync("qa-final-quality/report.json", JSON.stringify(report, null, 2));
          });
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 45 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-final-quality/final-quality.spec.ts --workers=1 --reporter=line > /tmp/browser.log 2>&1

      - name: Pages build and export
        id: pages
        continue-on-error: true
        shell: bash
        run: |
          VITE_BASE_PATH=/vne-n/ NITRO_PRESET=node-server bun run build > /tmp/pages-build.log 2>&1
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/pages-server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then break; fi
            sleep 1
          done
          PAGES_BASE=vne-n node scripts/export-github-pages.mjs > /tmp/pages-export.log 2>&1

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: final-quality-${{ github.run_id }}
          path: qa-final-quality
          retention-days: 4

      - name: Save result
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "widget=${{ steps.widget.outcome }}"
            echo "widget_ready=${{ steps.widget.outputs.ready }}"
            echo "install=${{ steps.install.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "build=${{ steps.build.outcome }}"
            echo "playwright=${{ steps.playwright.outcome }}"
            echo "browser=${{ steps.browser.outcome }}"
            echo "pages=${{ steps.pages.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== browser ====="
            cat /tmp/browser.log 2>/dev/null || true
            echo
            echo "===== build ====="
            cat /tmp/build.log 2>/dev/null || true
            echo
            echo "===== pages ====="
            cat /tmp/pages-build.log 2>/dev/null || true
            cat /tmp/pages-export.log 2>/dev/null || true
