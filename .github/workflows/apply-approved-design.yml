name: Apply approved design

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/premium-buttons-clean-blocks'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout approved branch
        uses: actions/checkout@v4
        with:
          ref: agent/premium-buttons-clean-blocks
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Apply approved source patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          if [ ! -f src/components/site/ApprovedInteractionsFinal.css ]; then
            printf '%s' "$PATCH_B64" | base64 -d | gzip -d > /tmp/approved.patch
            git apply /tmp/approved.patch
          fi
          python - <<'PY'
          from pathlib import Path
          p = Path('.github/workflows/pages.yml')
          s = p.read_text()
          marker = '          grep -Fq "TasteSystemFinal.css" src/components/site/Layout.tsx\n'
          extra = '          grep -Fq "ApprovedInteractionsFinal.css" src/components/site/Layout.tsx\n'
          if extra not in s:
              s = s.replace(marker, marker + extra)
              p.write_text(s)
          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format approved files
        run: bunx prettier --write src/components/site/PremiumLanding.tsx src/components/site/HomeConversionUpgrade.tsx src/routes/kontakt.tsx src/components/site/Layout.tsx src/components/site/ApprovedInteractionsFinal.css tests/home-contract.test.mjs scripts/security-audit.mjs

      - name: Validate approved website
        run: |
          node scripts/security-audit.mjs
          bun run lint
          bun run test
          bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/

      - name: Commit approved source
        shell: bash
        run: |
          git restore .github/workflows/pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/site/PremiumLanding.tsx src/components/site/HomeConversionUpgrade.tsx src/routes/kontakt.tsx src/components/site/Layout.tsx src/components/site/ApprovedInteractionsFinal.css tests/home-contract.test.mjs scripts/security-audit.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Refine approved CTA interactions and content hierarchy"
          git push origin HEAD:agent/premium-buttons-clean-blocks
