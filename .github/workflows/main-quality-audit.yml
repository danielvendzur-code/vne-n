name: Main quality audit

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: main-quality
  cancel-in-progress: true

jobs:
  quality:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip main-quality]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Export current source for visual audit
        uses: actions/upload-artifact@v4
        with:
          name: vne-n-current-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1

      - name: Install
        id: install
        continue-on-error: true
        run: bun install --frozen-lockfile > /tmp/install.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1

      - name: Contract tests
        id: test
        continue-on-error: true
        run: bun run test > /tmp/test.log 2>&1

      - name: Production build
        id: build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/build.log 2>&1

      - name: Save result
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "install=${{ steps.install.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "test=${{ steps.test.outcome }}"
            echo "build=${{ steps.build.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== test ====="
            cat /tmp/test.log 2>/dev/null || true
            echo
            echo "===== build ====="
            cat /tmp/build.log 2>/dev/null || true
          } > MAIN_QUALITY_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_QUALITY_AUDIT.txt
          git commit -m "chore: save main quality audit [skip main-quality]" || exit 0
          git push origin HEAD:main
