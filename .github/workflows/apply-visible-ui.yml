name: Apply visible UI rebuild

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/visible-ui-rebuild'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/visible-ui-rebuild
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Apply reviewed source patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_B64" | base64 --decode | gzip -dc > /tmp/visible-ui.patch
          git apply --check -p1 /tmp/visible-ui.patch
          git apply -p1 /tmp/visible-ui.patch
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format changed files
        run: bunx prettier --write src/components/site/ApprovedInteractionsFinal.css src/components/site/PremiumLanding.tsx tests/home-contract.test.mjs
      - name: Validate complete website
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/
        run: |
          node scripts/security-audit.mjs
          bun run lint
          bun run test
          bun run build
      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/site/ApprovedInteractionsFinal.css src/components/site/PremiumLanding.tsx tests/home-contract.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Rebuild visible website chip interactions"
          git push origin HEAD:agent/visible-ui-rebuild
