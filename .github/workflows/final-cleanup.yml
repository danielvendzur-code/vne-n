name: Final diagnostic cleanup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/final-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove completed one-time workflows and reports
        run: |
          rm -f .github/workflows/patch-js-yaml.yml
          rm -f .github/workflows/pages-preflight-diagnostic.yml
          rm -f .github/workflows/final-cleanup.yml
          rm -f PAGES_PREFLIGHT_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove completed deployment diagnostics [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
