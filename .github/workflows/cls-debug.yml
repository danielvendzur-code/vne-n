name: CLS debug

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

jobs:
  debug:
    if: ${{ !contains(github.event.head_commit.message, '[skip cls]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - env:
          NITRO_PRESET: node-server
        run: bun run build
      - run: npm install --no-save --ignore-scripts @playwright/test@1.55.0
      - run: npx playwright install --with-deps chromium
      - name: Trace layout shifts
        shell: bash
        run: |
          cat > cls-debug.mjs <<'JS'
          import { chromium } from '@playwright/test';
          import fs from 'node:fs';
          const browser = await chromium.launch();
          const output = {};
          for (const width of [768, 1440]) {
            const page = await browser.newPage({ viewport: { width, height: 900 } });
            await page.addInitScript(() => {
              window.__shifts = [];
              window.__cls = 0;
              const selector = (node) => {
                if (!(node instanceof Element)) return String(node?.nodeName ?? 'unknown');
                const id = node.id ? `#${node.id}` : '';
                const classes = [...node.classList].slice(0, 4).map((value) => `.${value}`).join('');
                return `${node.tagName.toLowerCase()}${id}${classes}`;
              };
              new PerformanceObserver((list) => {
                for (const entry of list.getEntries()) {
                  if (entry.hadRecentInput) continue;
                  window.__cls += entry.value;
                  window.__shifts.push({
                    value: entry.value,
                    time: entry.startTime,
                    sources: (entry.sources ?? []).map((source) => ({
                      node: selector(source.node),
                      text: source.node?.textContent?.trim().slice(0, 100) ?? '',
                      previousRect: source.previousRect,
                      currentRect: source.currentRect,
                    })),
                  });
                }
              }).observe({ type: 'layout-shift', buffered: true });
            });
            await page.goto('http://127.0.0.1:3000/postup', { waitUntil: 'domcontentloaded' });
            await page.waitForTimeout(2500);
            output[width] = await page.evaluate(() => ({
              cls: window.__cls,
              shifts: window.__shifts,
              fonts: document.fonts.status,
              interTight: document.fonts.check('16px "Inter Tight"'),
              scrollHeight: document.documentElement.scrollHeight,
            }));
            await page.close();
          }
          await browser.close();
          fs.writeFileSync('CLS_DEBUG.json', JSON.stringify(output, null, 2));
          JS
          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/cls-server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:3000/postup >/dev/null && break
            sleep 1
          done
          node cls-debug.mjs
          rm cls-debug.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLS_DEBUG.json
          git commit -m "chore: ulož diagnostiku CLS [skip cls]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
