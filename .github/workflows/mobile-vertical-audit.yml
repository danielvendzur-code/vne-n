name: Mobile vertical audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

concurrency:
  group: mobile-vertical-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip mobile-vertical]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        id: install
        continue-on-error: true
        run: bun install > /tmp/install.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1

      - name: Build
        id: build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/build.log 2>&1

      - name: Install Playwright
        id: playwright
        continue-on-error: true
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright.log 2>&1

      - name: Browser audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-mobile-vertical/screenshots
          cat > qa-mobile-vertical/mobile.spec.ts <<'TEST'
          import { test, expect, type BrowserContext, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const report: Record<string, unknown>[] = [];

          const consent = encodeURIComponent(
            JSON.stringify({
              version: 1,
              necessary: true,
              analytics: false,
              updatedAt: new Date().toISOString(),
            }),
          );

          async function seedConsent(context: BrowserContext) {
            await context.addCookies([
              { name: "vendzur_cookie_consent", value: consent, url: BASE, sameSite: "Lax" },
            ]);
          }

          async function open(page: Page) {
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1400);
            expect(errors).toEqual([]);
            const overflow = await page.evaluate(() =>
              document.documentElement.scrollWidth - document.documentElement.clientWidth,
            );
            expect(overflow).toBeLessThanOrEqual(1);
          }

          test("mobile controls stack and glide stays active", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            await seedConsent(context);
            const page = await context.newPage();
            await open(page);

            const heroButtons = page.locator(".lp-assistant-chips button");
            expect(await heroButtons.count()).toBe(3);
            const heroBoxes = await heroButtons.evaluateAll((items) =>
              items.map((item) => {
                const rect = item.getBoundingClientRect();
                return { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
              }),
            );
            expect(Math.abs(heroBoxes[0].left - heroBoxes[1].left)).toBeLessThan(1);
            expect(Math.abs(heroBoxes[1].left - heroBoxes[2].left)).toBeLessThan(1);
            expect(heroBoxes[1].top).toBeGreaterThan(heroBoxes[0].top + heroBoxes[0].height - 1);
            expect(heroBoxes[2].top).toBeGreaterThan(heroBoxes[1].top + heroBoxes[1].height - 1);
            expect(heroBoxes.every((box) => box.width > 280)).toBe(true);
            expect(await page.locator(".lp-assistant-chips").getAttribute("data-drag-ready")).toBeNull();

            const glide = await page.locator(".glide-field--hero .glide-field__canvas").evaluate((element) => {
              const style = getComputedStyle(element);
              return { animationName: style.animationName, animationDuration: style.animationDuration, opacity: style.opacity };
            });
            expect(glide.animationName).toContain("vendzur-glide-drift");
            expect(glide.animationName).toContain("vendzur-glide-breathe");

            const caps = page.locator(".lp-caps");
            await caps.scrollIntoViewIfNeeded();
            await page.waitForTimeout(600);
            const chips = caps.locator(".lp-chip");
            expect(await chips.count()).toBeGreaterThan(3);
            const chipBoxes = await chips.evaluateAll((items) =>
              items.slice(0, 4).map((item) => {
                const rect = item.getBoundingClientRect();
                return { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
              }),
            );
            expect(chipBoxes.every((box) => box.width > 300)).toBe(true);
            for (let index = 1; index < chipBoxes.length; index += 1) {
              expect(chipBoxes[index].top).toBeGreaterThan(chipBoxes[index - 1].top + chipBoxes[index - 1].height - 1);
            }
            expect(await page.locator(".lp-caps-chips").getAttribute("data-drag-ready")).toBeNull();

            await page.screenshot({ path: "qa-mobile-vertical/screenshots/mobile-stacked.png", fullPage: true });
            report.push({ test: "mobile-stack-glide", heroBoxes, chipBoxes, glide, passed: true });
            await context.close();
          });

          test("cookie banner and settings remain sticky", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            const banner = page.locator(".cookie-banner");
            await expect(banner).toBeVisible({ timeout: 3500 });
            const bannerMetrics = await banner.evaluate((element) => {
              const style = getComputedStyle(element);
              const rect = element.getBoundingClientRect();
              return {
                position: style.position,
                bottom: innerHeight - rect.bottom,
                left: rect.left,
                right: innerWidth - rect.right,
                overflowY: style.overflowY,
              };
            });
            expect(bannerMetrics.position).toBe("fixed");
            expect(bannerMetrics.bottom).toBeGreaterThanOrEqual(8);
            expect(bannerMetrics.left).toBeGreaterThanOrEqual(8);
            expect(bannerMetrics.right).toBeGreaterThanOrEqual(8);

            const actionBoxes = await banner.locator(".cookie-banner__actions button").evaluateAll((items) =>
              items.map((item) => {
                const rect = item.getBoundingClientRect();
                return { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
              }),
            );
            expect(actionBoxes[1].top).toBeGreaterThan(actionBoxes[0].top + actionBoxes[0].height - 1);
            expect(Math.abs(actionBoxes[0].width - actionBoxes[1].width)).toBeLessThan(2);

            await banner.getByRole("button", { name: /Nastaviť podrobne/ }).click();
            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            const sticky = await modal.evaluate((element) => {
              const head = element.querySelector<HTMLElement>(".cookie-modal__head")!;
              const actions = element.querySelector<HTMLElement>(".cookie-modal__actions")!;
              return {
                head: getComputedStyle(head).position,
                actions: getComputedStyle(actions).position,
                maxHeight: getComputedStyle(element).maxHeight,
              };
            });
            expect(sticky.head).toBe("sticky");
            expect(sticky.actions).toBe("sticky");
            await page.screenshot({ path: "qa-mobile-vertical/screenshots/cookies-sticky.png" });
            report.push({ test: "sticky-cookies", bannerMetrics, actionBoxes, sticky, passed: true });
            await context.close();
          });

          test("widget choices are vertical", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            await seedConsent(context);
            const page = await context.newPage();
            await open(page);
            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible({ timeout: 7000 });
            await launcher.evaluate((button: HTMLButtonElement) => button.click());
            const panel = page.locator("#chameleon-widget-panel");
            await expect(panel).toBeVisible();
            await page.waitForTimeout(700);

            const replies = panel.locator(".cw-quick-replies");
            const repliesMetrics = await replies.evaluate((element) => ({
              display: getComputedStyle(element).display,
              overflowX: getComputedStyle(element).overflowX,
              scrollWidth: element.scrollWidth,
              clientWidth: element.clientWidth,
            }));
            expect(repliesMetrics.display).toBe("grid");
            expect(repliesMetrics.scrollWidth).toBeLessThanOrEqual(repliesMetrics.clientWidth + 1);

            const replyBoxes = await replies.locator(".cw-chip").evaluateAll((items) =>
              items.slice(0, 3).map((item) => {
                const rect = item.getBoundingClientRect();
                return { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
              }),
            );
            expect(replyBoxes.length).toBeGreaterThan(1);
            expect(replyBoxes[1].top).toBeGreaterThan(replyBoxes[0].top + replyBoxes[0].height - 1);

            await panel.getByTestId("tab-calculator").click();
            await page.waitForTimeout(700);
            const rows = panel.locator(".cw-rows");
            await expect(rows).toBeVisible();
            const rowMetrics = await rows.evaluate((element) => ({
              display: getComputedStyle(element).display,
              overflowX: getComputedStyle(element).overflowX,
              scrollWidth: element.scrollWidth,
              clientWidth: element.clientWidth,
            }));
            expect(rowMetrics.display).toBe("grid");
            expect(rowMetrics.scrollWidth).toBeLessThanOrEqual(rowMetrics.clientWidth + 1);
            const cards = await rows.locator(".cw-rowcard").evaluateAll((items) =>
              items.slice(0, 3).map((item) => {
                const rect = item.getBoundingClientRect();
                return { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
              }),
            );
            expect(cards.length).toBeGreaterThan(1);
            expect(cards[1].top).toBeGreaterThan(cards[0].top + cards[0].height - 1);
            expect(Math.abs(cards[0].left - cards[1].left)).toBeLessThan(1);
            await page.screenshot({ path: "qa-mobile-vertical/screenshots/widget-vertical.png" });
            report.push({ test: "widget-vertical", repliesMetrics, replyBoxes, rowMetrics, cards, passed: true });
            await context.close();
          });

          test.afterAll(() => {
            fs.writeFileSync("qa-mobile-vertical/report.json", JSON.stringify(report, null, 2));
          });
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 45 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-mobile-vertical/mobile.spec.ts --workers=1 --reporter=line > /tmp/browser.log 2>&1

      - name: Pages build and export
        id: pages
        continue-on-error: true
        shell: bash
        run: |
          VITE_BASE_PATH=/vne-n/ NITRO_PRESET=node-server bun run build > /tmp/pages-build.log 2>&1
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/pages-server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then break; fi
            sleep 1
          done
          PAGES_BASE=vne-n node scripts/export-github-pages.mjs > /tmp/pages-export.log 2>&1

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-vertical-${{ github.run_id }}
          path: qa-mobile-vertical
          retention-days: 3

      - name: Write result
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "install=${{ steps.install.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "build=${{ steps.build.outcome }}"
            echo "playwright=${{ steps.playwright.outcome }}"
            echo "browser=${{ steps.browser.outcome }}"
            echo "pages=${{ steps.pages.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== browser ====="
            cat /tmp/browser.log 2>/dev/null || true
            echo
            echo "===== build ====="
            cat /tmp/build.log 2>/dev/null || true
            echo
            echo "===== pages ====="
            cat /tmp/pages-build.log 2>/dev/null || true
            cat /tmp/pages-export.log 2>/dev/null || true
          } > MOBILE_VERTICAL_AUDIT.txt
          echo "${{ github.run_id }}" > MOBILE_VERTICAL_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MOBILE_VERTICAL_AUDIT.txt MOBILE_VERTICAL_RUN_ID.txt
          git commit -m "chore: ulož mobilný vertikálny audit [skip mobile-vertical]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
