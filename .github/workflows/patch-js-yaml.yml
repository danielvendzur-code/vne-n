name: Apply js-yaml security patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-js-yaml.yml

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Pin the patched v4-compatible js-yaml release
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.overrides = { ...(pkg.overrides || {}), 'js-yaml': '4.3.0' };
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          bun install
      - name: Verify dependency audit
        run: bun audit --prod --audit-level=high
      - name: Verify source security
        run: node scripts/security-audit.mjs
      - name: Verify lint and contracts
        run: |
          bun run lint
          bun run test
      - name: Verify production build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/
        run: bun run build
      - name: Publish patched lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json bun.lock
          git commit -m "security: upgrade js-yaml to patched 4.3.0 [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
