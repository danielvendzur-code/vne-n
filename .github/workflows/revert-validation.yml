name: Validate restored website

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'agent/revert-competition-redesign'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout restored branch
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: node scripts/security-audit.mjs

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test

      - name: Production build
        run: bun run build
        env:
          NITRO_PRESET: node-server
          VITE_BASE_PATH: /vne-n/
