name: Landing CLS debug

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

jobs:
  debug:
    if: ${{ !contains(github.event.head_commit.message, '[skip landing cls]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - env:
          NITRO_PRESET: node-server
        run: bun run build
      - run: npm install --no-save --ignore-scripts @playwright/test@1.55.0
      - run: npx playwright install --with-deps chromium
      - name: Trace landing shifts
        shell: bash
        run: |
          cat > landing-cls.mjs <<'JS'
          import { chromium } from '@playwright/test';
          import fs from 'node:fs';
          const browser = await chromium.launch();
          const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
          await page.addInitScript(() => {
            window.__shifts = [];
            window.__cls = 0;
            const selector = (node) => {
              if (!(node instanceof Element)) return String(node?.nodeName ?? 'unknown');
              const id = node.id ? `#${node.id}` : '';
              const classes = [...node.classList].slice(0, 5).map((value) => `.${value}`).join('');
              return `${node.tagName.toLowerCase()}${id}${classes}`;
            };
            new PerformanceObserver((list) => {
              for (const entry of list.getEntries()) {
                if (entry.hadRecentInput) continue;
                window.__cls += entry.value;
                window.__shifts.push({
                  value: entry.value,
                  time: entry.startTime,
                  sources: (entry.sources ?? []).map((source) => ({
                    node: selector(source.node),
                    text: source.node?.textContent?.trim().slice(0, 120) ?? '',
                    previousRect: source.previousRect,
                    currentRect: source.currentRect,
                  })),
                });
              }
            }).observe({ type: 'layout-shift', buffered: true });
          });
          await page.goto('http://127.0.0.1:3000/', { waitUntil: 'domcontentloaded' });
          await page.waitForTimeout(2500);
          const output = await page.evaluate(() => ({
            cls: window.__cls,
            shifts: window.__shifts,
            fonts: document.fonts.status,
            inter: document.fonts.check('16px "Inter"'),
            interTight: document.fonts.check('16px "Inter Tight"'),
          }));
          await browser.close();
          fs.writeFileSync('LANDING_CLS_DEBUG.json', JSON.stringify(output, null, 2));
          JS
          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs >/tmp/landing-server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:3000/ >/dev/null && break
            sleep 1
          done
          node landing-cls.mjs
          rm landing-cls.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LANDING_CLS_DEBUG.json
          git commit -m "chore: ulož diagnostiku landingu [skip landing cls] [skip audit]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
