name: Mobile final audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

concurrency:
  group: mobile-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip mobile-final]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        id: install
        continue-on-error: true
        run: bun install > /tmp/install.log 2>&1
      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1
      - name: Build
        id: build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/build.log 2>&1
      - name: Install Playwright
        id: playwright
        continue-on-error: true
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright.log 2>&1
      - name: Browser audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-mobile-final/screenshots
          cat > qa-mobile-final/mobile-final.spec.ts <<'TEST'
          import { test, expect, type BrowserContext, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const report: Record<string, unknown>[] = [];
          const consent = encodeURIComponent(JSON.stringify({ version: 1, necessary: true, analytics: false, updatedAt: new Date().toISOString() }));

          async function seed(context: BrowserContext) {
            await context.addCookies([{ name: "vendzur_cookie_consent", value: consent, url: BASE, sameSite: "Lax" }]);
          }

          async function open(page: Page) {
            const errors: string[] = [];
            page.on("pageerror", (error) => errors.push(error.message));
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.waitForTimeout(1500);
            expect(errors).toEqual([]);
            expect(await page.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth)).toBeLessThanOrEqual(1);
          }

          test("mobile site is vertical and animated", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            await seed(context);
            const page = await context.newPage();
            await open(page);

            const card = page.locator(".lp-assistant-card");
            const cardBox = await card.boundingBox();
            if (!cardBox) throw new Error("Missing assistant card");
            expect(cardBox.width).toBeGreaterThan(340);
            expect(cardBox.left).toBeGreaterThanOrEqual(14);
            expect(390 - cardBox.right).toBeGreaterThanOrEqual(14);

            const heroButtons = page.locator(".lp-assistant-chips button");
            const hero = await heroButtons.evaluateAll((items) => items.map((item) => {
              const rect = item.getBoundingClientRect();
              const fill = item.querySelector<HTMLElement>(".lp-chip-liquid");
              return {
                left: rect.left,
                top: rect.top,
                width: rect.width,
                height: rect.height,
                fillWidth: fill?.getBoundingClientRect().width ?? 0,
                fillHeight: fill?.getBoundingClientRect().height ?? 0,
              };
            }));
            expect(hero).toHaveLength(3);
            expect(hero.every((item) => item.width > 320)).toBe(true);
            expect(hero[1].top).toBeGreaterThan(hero[0].top + hero[0].height - 1);
            expect(hero[2].top).toBeGreaterThan(hero[1].top + hero[1].height - 1);
            const active = hero.find((item) => item.fillWidth > 0)!;
            expect(active.fillWidth).toBeGreaterThan(active.width - 3);
            expect(active.fillHeight).toBeGreaterThan(active.height - 3);
            expect(await page.locator(".lp-assistant-chips").getAttribute("data-drag-ready")).toBeNull();

            const glide = await page.locator(".glide-field--hero .glide-field__canvas").evaluate((element) => {
              const style = getComputedStyle(element);
              return { name: style.animationName, duration: style.animationDuration, state: style.animationPlayState };
            });
            expect(glide.name).toContain("vendzur-glide-drift");
            expect(glide.name).toContain("vendzur-glide-breathe");
            expect(glide.state).toContain("running");

            const caps = page.locator(".lp-caps");
            await caps.scrollIntoViewIfNeeded();
            await page.waitForTimeout(600);
            const chips = await caps.locator(".lp-chip").evaluateAll((items) => items.slice(0, 4).map((item) => {
              const rect = item.getBoundingClientRect();
              return { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
            }));
            expect(chips.length).toBeGreaterThan(3);
            expect(chips.every((item) => item.width > 330)).toBe(true);
            for (let i = 1; i < chips.length; i += 1) expect(chips[i].top).toBeGreaterThan(chips[i - 1].top + chips[i - 1].height - 1);
            expect(await page.locator(".lp-caps-chips").getAttribute("data-drag-ready")).toBeNull();
            await page.screenshot({ path: "qa-mobile-final/screenshots/site-mobile.png", fullPage: true });
            report.push({ test: "site", cardBox, hero, glide, chips, passed: true });
            await context.close();
          });

          test("cookies are fixed with sticky controls", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            const banner = page.locator(".cookie-banner");
            await expect(banner).toBeVisible({ timeout: 3500 });
            const fixed = await banner.evaluate((element) => {
              const rect = element.getBoundingClientRect();
              return { position: getComputedStyle(element).position, bottom: innerHeight - rect.bottom, left: rect.left, right: innerWidth - rect.right };
            });
            expect(fixed.position).toBe("fixed");
            expect(fixed.bottom).toBeGreaterThanOrEqual(8);
            expect(fixed.left).toBeGreaterThanOrEqual(8);
            expect(fixed.right).toBeGreaterThanOrEqual(8);
            const actionTops = await banner.locator(".cookie-banner__actions button").evaluateAll((items) => items.map((item) => item.getBoundingClientRect().top));
            expect(actionTops[1]).toBeGreaterThan(actionTops[0]);

            await banner.getByRole("button", { name: /Nastaviť podrobne/ }).click();
            const modal = page.locator(".cookie-modal");
            await expect(modal).toBeVisible();
            const sticky = await modal.evaluate((element) => ({
              head: getComputedStyle(element.querySelector(".cookie-modal__head")!).position,
              actions: getComputedStyle(element.querySelector(".cookie-modal__actions")!).position,
              background: getComputedStyle(element).backgroundImage,
            }));
            expect(sticky.head).toBe("sticky");
            expect(sticky.actions).toBe("sticky");
            expect(sticky.background).toContain("linear-gradient");
            await page.screenshot({ path: "qa-mobile-final/screenshots/cookies-mobile.png" });
            report.push({ test: "cookies", fixed, sticky, passed: true });
            await context.close();
          });

          test("widget replies and calculator card CSS are vertical", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 }, hasTouch: true, isMobile: true });
            await seed(context);
            const page = await context.newPage();
            await open(page);
            const launcher = page.locator("#chameleon-widget-launcher");
            await expect(launcher).toBeVisible({ timeout: 7000 });
            await launcher.evaluate((button: HTMLButtonElement) => button.click());
            const panel = page.locator("#chameleon-widget-panel");
            await expect(panel).toBeVisible();
            await page.waitForTimeout(700);

            const replies = panel.locator(".cw-quick-replies");
            const replyMetrics = await replies.evaluate((element) => ({
              display: getComputedStyle(element).display,
              overflowX: getComputedStyle(element).overflowX,
              scrollWidth: element.scrollWidth,
              clientWidth: element.clientWidth,
            }));
            expect(replyMetrics.display).toBe("grid");
            expect(replyMetrics.scrollWidth).toBeLessThanOrEqual(replyMetrics.clientWidth + 1);
            const replyBoxes = await replies.locator(".cw-chip").evaluateAll((items) => items.slice(0, 3).map((item) => {
              const rect = item.getBoundingClientRect();
              return { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
            }));
            expect(replyBoxes.length).toBeGreaterThan(1);
            expect(replyBoxes[1].top).toBeGreaterThan(replyBoxes[0].top + replyBoxes[0].height - 1);
            await page.screenshot({ path: "qa-mobile-final/screenshots/widget-replies.png" });

            const fixture = await page.evaluate(() => {
              const widget = document.querySelector<HTMLElement>(".cw-widget");
              if (!widget) throw new Error("Missing widget root");
              const rows = document.createElement("div");
              rows.className = "cw-rows";
              rows.style.position = "fixed";
              rows.style.left = "12px";
              rows.style.right = "12px";
              rows.style.top = "100px";
              rows.style.zIndex = "2147483647";
              for (let index = 0; index < 3; index += 1) {
                const card = document.createElement("button");
                card.className = "cw-rowcard";
                card.innerHTML = `<span class="cw-rowcard__icon"></span><span class="cw-rowcard__body"><b>Možnosť ${index + 1}</b><span>Test vertikálneho rozloženia</span></span>`;
                rows.append(card);
              }
              widget.append(rows);
              const style = getComputedStyle(rows);
              const boxes = Array.from(rows.querySelectorAll<HTMLElement>(".cw-rowcard")).map((item) => {
                const rect = item.getBoundingClientRect();
                return { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
              });
              return { display: style.display, overflowX: style.overflowX, scrollWidth: rows.scrollWidth, clientWidth: rows.clientWidth, boxes };
            });
            expect(fixture.display).toBe("grid");
            expect(fixture.scrollWidth).toBeLessThanOrEqual(fixture.clientWidth + 1);
            expect(fixture.boxes[1].top).toBeGreaterThan(fixture.boxes[0].top + fixture.boxes[0].height - 1);
            expect(Math.abs(fixture.boxes[0].left - fixture.boxes[1].left)).toBeLessThan(1);
            await page.screenshot({ path: "qa-mobile-final/screenshots/widget-cards.png" });
            report.push({ test: "widget", replyMetrics, replyBoxes, fixture, passed: true });
            await context.close();
          });

          test.afterAll(() => fs.writeFileSync("qa-mobile-final/report.json", JSON.stringify(report, null, 2)));
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 45 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-mobile-final/mobile-final.spec.ts --workers=1 --reporter=line > /tmp/browser.log 2>&1
      - name: Pages build and export
        id: pages
        continue-on-error: true
        shell: bash
        run: |
          VITE_BASE_PATH=/vne-n/ NITRO_PRESET=node-server bun run build > /tmp/pages-build.log 2>&1
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/pages-server.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then break; fi
            sleep 1
          done
          PAGES_BASE=vne-n node scripts/export-github-pages.mjs > /tmp/pages-export.log 2>&1
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-final-${{ github.run_id }}
          path: qa-mobile-final
          retention-days: 3
      - name: Save result
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "install=${{ steps.install.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "build=${{ steps.build.outcome }}"
            echo "playwright=${{ steps.playwright.outcome }}"
            echo "browser=${{ steps.browser.outcome }}"
            echo "pages=${{ steps.pages.outcome }}"
            echo
            echo "===== lint ====="
            cat /tmp/lint.log 2>/dev/null || true
            echo
            echo "===== browser ====="
            cat /tmp/browser.log 2>/dev/null || true
            echo
            echo "===== build ====="
            cat /tmp/build.log 2>/dev/null || true
            echo
            echo "===== pages ====="
            cat /tmp/pages-build.log 2>/dev/null || true
            cat /tmp/pages-export.log 2>/dev/null || true
          } > MOBILE_FINAL_AUDIT.txt
          echo "${{ github.run_id }}" > MOBILE_FINAL_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MOBILE_FINAL_AUDIT.txt MOBILE_FINAL_RUN_ID.txt
          git commit -m "chore: ulož finálny mobilný audit [skip mobile-final]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk
