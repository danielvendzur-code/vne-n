name: Execute verified homepage refactor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/world-class-homepage-executor.yml

permissions:
  contents: write

jobs:
  execute:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install, refactor, verify and publish
        shell: bash
        env:
          NITRO_PRESET: node-server
        run: |
          set +e
          bun install --frozen-lockfile > /tmp/install.log 2>&1
          INSTALL=$?

          python <<'PY' > /tmp/extract.log 2>&1
          from pathlib import Path
          source = Path('.github/workflows/world-class-homepage-refactor-v2.yml').read_text()
          start = source.index("          python <<'PY'\n") + len("          python <<'PY'\n")
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/homepage-refactor.py').write_text(script)
          PY
          EXTRACT=$?

          if [ "$EXTRACT" -eq 0 ]; then
            python /tmp/homepage-refactor.py > /tmp/refactor.log 2>&1
            REFACTOR=$?
          else
            REFACTOR=99
          fi

          if [ "$REFACTOR" -eq 0 ]; then
            python <<'PY' > /tmp/repair.log 2>&1
          from pathlib import Path
          path = Path('src/components/site/SiteMotionEnhancements.tsx')
          text = path.read_text()
          if 'export function SiteMotionEnhancements()' not in text:
              marker = 'const clamp = (value: number, min: number, max: number) => Math.min(max, Math.max(min, value));\n'
              if marker not in text:
                  raise SystemExit('clamp marker missing')
              text = text.replace(
                  marker,
                  marker + '\nexport function SiteMotionEnhancements() {\n  const reducedMotion = useReducedMotion();\n',
                  1,
              )
          if 'refineHomepageCopy' in text or 'const replaceText' in text:
              raise SystemExit('runtime copy patch remains')
          if text.count('export function SiteMotionEnhancements()') != 1:
              raise SystemExit('invalid component declaration count')
          path.write_text(text)
          PY
            REPAIR=$?
          else
            REPAIR=99
          fi

          if [ "$REPAIR" -eq 0 ]; then
            bunx prettier --write src/components/site/PremiumLanding.tsx src/components/site/Nav.tsx src/components/site/Layout.tsx src/components/site/SiteMotionEnhancements.tsx src/config/site.ts tests/home-contract.test.mjs > /tmp/format.log 2>&1
            FORMAT=$?
            bun run lint > /tmp/lint.log 2>&1
            LINT=$?
            bun run test > /tmp/test.log 2>&1
            TEST=$?
            bun run build > /tmp/build.log 2>&1
            BUILD=$?
          else
            FORMAT=99
            LINT=99
            TEST=99
            BUILD=99
          fi

          {
            echo "install=$INSTALL"
            echo "extract=$EXTRACT"
            echo "refactor=$REFACTOR"
            echo "repair=$REPAIR"
            echo "format=$FORMAT"
            echo "lint=$LINT"
            echo "test=$TEST"
            echo "build=$BUILD"
            for name in install extract refactor repair format lint test build; do
              echo
              echo "===== $name ====="
              cat "/tmp/$name.log" 2>/dev/null || true
            done
          } > HOMEPAGE_REFACTOR_EXECUTION.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HOMEPAGE_REFACTOR_EXECUTION.txt

          if [ "$INSTALL" -eq 0 ] && [ "$EXTRACT" -eq 0 ] && [ "$REFACTOR" -eq 0 ] && [ "$REPAIR" -eq 0 ] && [ "$FORMAT" -eq 0 ] && [ "$LINT" -eq 0 ] && [ "$TEST" -eq 0 ] && [ "$BUILD" -eq 0 ]; then
            git add -A
            MESSAGE="refactor: move chatbot-first UX into direct React source [skip main-quality]"
          else
            git reset .github/workflows/world-class-homepage-executor.yml 2>/dev/null || true
            MESSAGE="chore: record homepage refactor execution [skip main-quality]"
          fi

          git commit -m "$MESSAGE" || true
          git pull --rebase origin main
          git push origin HEAD:main
