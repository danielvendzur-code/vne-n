name: Execute verified homepage refactor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/world-class-homepage-executor.yml

permissions:
  contents: write

jobs:
  execute:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Extract and run verified refactor
        run: |
          python <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/world-class-homepage-refactor-v2.yml').read_text()
          start = source.index("          python <<'PY'\n") + len("          python <<'PY'\n")
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/homepage-refactor.py').write_text(script)
          PY
          python /tmp/homepage-refactor.py
      - name: Format
        run: bunx prettier --write src/components/site/PremiumLanding.tsx src/components/site/Nav.tsx src/components/site/Layout.tsx src/components/site/SiteMotionEnhancements.tsx src/config/site.ts tests/home-contract.test.mjs
      - name: Lint
        run: bun run lint
      - name: Tests
        run: bun run test
      - name: Production build
        env:
          NITRO_PRESET: node-server
        run: bun run build
      - name: Commit and safely publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: move chatbot-first UX into direct React source [skip main-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
