name: Final branch audit

on:
  push:
    branches:
      - claude/web-portfolio-publish-ynh7sk

permissions:
  contents: write

jobs:
  audit:
    if: ${{ !contains(github.event.head_commit.message, '[skip audit]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: bun install > /tmp/install.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: bun run lint > /tmp/lint.log 2>&1

      - name: Node server build
        id: node_build
        continue-on-error: true
        env:
          NITRO_PRESET: node-server
        run: bun run build > /tmp/node-build.log 2>&1

      - name: Setup Playwright
        id: playwright
        continue-on-error: true
        shell: bash
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0 > /tmp/playwright-package.log 2>&1
          npx playwright install --with-deps chromium > /tmp/chromium.log 2>&1

      - name: Browser audit and screenshots
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p qa-output/screenshots
          cat > qa-output/visual.spec.ts <<'TEST'
          import { test, expect, type Page } from "@playwright/test";
          import fs from "node:fs";

          const BASE = "http://127.0.0.1:3000";
          const routes = [
            { path: "/", name: "index", shell: true },
            { path: "/sluzby", name: "sluzby", shell: true },
            { path: "/projekty/", name: "projekty", shell: true },
            { path: "/projekty/ukazka-01", name: "projekt-detail", shell: true },
            { path: "/postup", name: "postup", shell: true },
            { path: "/kontakt", name: "kontakt", shell: true },
            { path: "/farby", name: "farby", shell: false },
            { path: "/neznamy-audit", name: "404", shell: true },
          ];
          const screenshotViewports = [
            { name: "desktop", width: 1440, height: 900 },
            { name: "mobile", width: 390, height: 844 },
          ];
          const auditWidths = [360, 768, 1440];
          const report: Record<string, unknown>[] = [];

          async function prepare(page: Page) {
            await page.addInitScript(() => {
              (window as any).__qaCls = 0;
              new PerformanceObserver((list) => {
                for (const entry of list.getEntries() as any[]) {
                  if (!entry.hadRecentInput) (window as any).__qaCls += entry.value;
                }
              }).observe({ type: "layout-shift", buffered: true });
            });
          }

          async function revealPage(page: Page) {
            const height = await page.evaluate(() => document.documentElement.scrollHeight);
            const viewport = page.viewportSize()?.height ?? 800;
            for (let y = 0; y < height; y += Math.max(320, Math.floor(viewport * 0.72))) {
              await page.evaluate((top) => window.scrollTo({ top, behavior: "auto" }), y);
              await page.waitForTimeout(90);
            }
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "auto" }));
            await page.waitForTimeout(220);
          }

          for (const route of routes) {
            for (const viewport of screenshotViewports) {
              test(`screenshot ${route.name} ${viewport.name}`, async ({ browser }) => {
                const context = await browser.newContext({
                  viewport: { width: viewport.width, height: viewport.height },
                  reducedMotion: "no-preference",
                });
                const page = await context.newPage();
                await prepare(page);
                const pageErrors: string[] = [];
                page.on("pageerror", (error) => pageErrors.push(error.message));
                await page.goto(`${BASE}${route.path}`, { waitUntil: "domcontentloaded" });
                await page.waitForTimeout(800);
                await revealPage(page);
                const metrics = await page.evaluate(() => ({
                  scrollWidth: document.documentElement.scrollWidth,
                  clientWidth: document.documentElement.clientWidth,
                  cls: Number(((window as any).__qaCls ?? 0).toFixed(5)),
                  headers: document.querySelectorAll(".site-header").length,
                  footers: document.querySelectorAll(".premium-footer").length,
                }));
                expect(metrics.scrollWidth).toBeLessThanOrEqual(metrics.clientWidth + 1);
                expect(metrics.cls).toBeLessThan(0.1);
                expect(metrics.headers).toBe(route.shell ? 1 : 0);
                expect(metrics.footers).toBe(route.shell ? 1 : 0);
                expect(pageErrors).toEqual([]);
                await page.screenshot({
                  path: `qa-output/screenshots/${route.name}-${viewport.name}.png`,
                  fullPage: true,
                });
                report.push({ route: route.path, viewport, metrics, pageErrors });
                await context.close();
              });
            }
          }

          for (const route of routes) {
            for (const width of auditWidths) {
              test(`overflow ${route.name} ${width}`, async ({ browser }) => {
                const context = await browser.newContext({
                  viewport: { width, height: width === 360 ? 800 : 900 },
                  reducedMotion: "no-preference",
                });
                const page = await context.newPage();
                await prepare(page);
                await page.goto(`${BASE}${route.path}`, { waitUntil: "domcontentloaded" });
                await page.waitForTimeout(650);
                const metrics = await page.evaluate(() => ({
                  scrollWidth: document.documentElement.scrollWidth,
                  clientWidth: document.documentElement.clientWidth,
                  cls: Number(((window as any).__qaCls ?? 0).toFixed(5)),
                }));
                expect(metrics.scrollWidth).toBeLessThanOrEqual(metrics.clientWidth + 1);
                expect(metrics.cls).toBeLessThan(0.1);
                report.push({ route: route.path, width, metrics });
                await context.close();
              });
            }
          }

          test("perzistentná hlavička a pätička pri route transition", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.evaluate(() => {
              (window as any).__qaHeader = document.querySelector(".site-header");
              (window as any).__qaFooter = document.querySelector(".premium-footer");
            });
            await page.getByRole("link", { name: "Služby", exact: true }).click();
            await page.waitForURL("**/sluzby");
            await page.waitForTimeout(350);
            const persisted = await page.evaluate(() => ({
              header: (window as any).__qaHeader === document.querySelector(".site-header"),
              footer: (window as any).__qaFooter === document.querySelector(".premium-footer"),
              headers: document.querySelectorAll(".site-header").length,
              footers: document.querySelectorAll(".premium-footer").length,
            }));
            expect(persisted).toEqual({ header: true, footer: true, headers: 1, footers: 1 });
            report.push({ interaction: "route-transition", persisted });
            await context.close();
          });

          test("mobilné menu, blur a spring zatvorenie", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.getByRole("button", { name: "Otvoriť menu" }).click();
            await page.waitForTimeout(650);
            const openState = await page.evaluate(() => ({
              open: document.querySelector(".site-menu-layer")?.getAttribute("data-open"),
              blur: getComputedStyle(document.querySelector(".site-menu-backdrop") as Element)
                .backdropFilter,
              firstItemOpacity: getComputedStyle(
                document.querySelector(".rb-line-sidebar__item") as Element,
              ).opacity,
            }));
            expect(openState.open).toBe("true");
            expect(openState.blur).toContain("blur");
            expect(Number(openState.firstItemOpacity)).toBeGreaterThan(0.95);
            await page.screenshot({ path: "qa-output/screenshots/menu-mobile-open.png" });
            await page.getByRole("button", { name: /Zavrieť menu/ }).first().click();
            await page.waitForTimeout(60);
            const movingTransform = await page
              .locator(".site-menu-drawer")
              .evaluate((element) => getComputedStyle(element).transform);
            await page.waitForTimeout(700);
            const finalTransform = await page
              .locator(".site-menu-drawer")
              .evaluate((element) => getComputedStyle(element).transform);
            expect(movingTransform).not.toBe(finalTransform);
            expect(await page.locator(".site-menu-layer").getAttribute("data-open")).toBe("false");
            report.push({ interaction: "mobile-menu", openState, movingTransform, finalTransform });
            await context.close();
          });

          test("hero parallax, tilt a reduced motion", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.evaluate(() => window.scrollTo(0, 420));
            await page.waitForTimeout(180);
            const glideTransform = await page
              .locator(".lp-hero-glide")
              .evaluate((element) => (element as HTMLElement).style.transform);
            expect(glideTransform).toContain("translate3d");
            const card = page.locator(".lp-assistant-card");
            const box = await card.boundingBox();
            if (!box) throw new Error("Hero karta nemá rozmery");
            await page.mouse.move(box.x + box.width * 0.82, box.y + box.height * 0.24);
            await page.waitForTimeout(120);
            const tiltTransform = await card.evaluate(
              (element) => (element as HTMLElement).style.transform,
            );
            expect(tiltTransform).toContain("rotateX");
            expect(tiltTransform).toContain("rotateY");
            report.push({ interaction: "hero-motion", glideTransform, tiltTransform });
            await context.close();

            const reducedContext = await browser.newContext({
              viewport: { width: 1440, height: 900 },
              reducedMotion: "reduce",
            });
            const reducedPage = await reducedContext.newPage();
            await reducedPage.goto(BASE, { waitUntil: "domcontentloaded" });
            await reducedPage.evaluate(() => window.scrollTo(0, 420));
            await reducedPage.waitForTimeout(160);
            const reducedTransform = await reducedPage
              .locator(".lp-hero-glide")
              .evaluate((element) => (element as HTMLElement).style.transform);
            expect(reducedTransform).toBe("");
            report.push({ interaction: "reduced-motion", reducedTransform });
            await reducedContext.close();
          });

          test("DERAT mobilné snap body", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
            const page = await context.newPage();
            await page.goto(BASE, { waitUntil: "domcontentloaded" });
            await page.locator(".derat-story").scrollIntoViewIfNeeded();
            await page.waitForTimeout(300);
            const dots = page.locator(".derat-story__dots button");
            expect(await dots.count()).toBe(4);
            await dots.nth(2).click();
            await page.waitForTimeout(850);
            expect(await dots.nth(2).getAttribute("data-active")).toBe("true");
            report.push({ interaction: "derat-dots", active: 2 });
            await context.close();
          });

          test("DemoViewer otvorenie a zatvorenie", async ({ browser }) => {
            const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
            const page = await context.newPage();
            await page.goto(`${BASE}/projekty/ukazka-01`, { waitUntil: "domcontentloaded" });
            await page.getByRole("button", { name: /Vyskúšať ukážku/ }).click();
            const dialog = page.getByRole("dialog");
            await expect(dialog).toBeVisible();
            await page.waitForTimeout(350);
            await page.screenshot({ path: "qa-output/screenshots/demo-viewer-desktop.png" });
            await page.keyboard.press("Escape");
            await expect(dialog).toBeHidden();
            report.push({ interaction: "demo-viewer", opened: true, closedWithEscape: true });
            await context.close();
          });

          test.afterAll(() => {
            fs.writeFileSync("qa-output/browser-report.json", JSON.stringify(report, null, 2));
          });
          TEST

          PORT=3000 NITRO_PORT=3000 node .output/server/index.mjs > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then break; fi
            if [ "$attempt" -eq 40 ]; then cat /tmp/server.log; exit 1; fi
            sleep 1
          done
          npx playwright test qa-output/visual.spec.ts --workers=1 --reporter=line > /tmp/browser.log 2>&1

      - name: GitHub Pages build
        id: pages_build
        continue-on-error: true
        env:
          VITE_BASE_PATH: /vne-n/
          NITRO_PRESET: node-server
        run: bun run build > /tmp/pages-build.log 2>&1

      - name: GitHub Pages export
        id: pages_export
        continue-on-error: true
        shell: bash
        run: |
          PORT=4173 NITRO_PORT=4173 node .output/server/index.mjs > /tmp/pages-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/vne-n/ > /dev/null; then break; fi
            if [ "$attempt" -eq 40 ]; then cat /tmp/pages-server.log; exit 1; fi
            sleep 1
          done
          PAGES_BASE=vne-n node scripts/export-github-pages.mjs > /tmp/pages-export.log 2>&1

      - name: Write report
        if: always()
        shell: bash
        run: |
          mkdir -p qa-output
          cat > qa-output/summary.txt <<EOF
          run_id=${{ github.run_id }}
          install=${{ steps.install.outcome }}
          lint=${{ steps.lint.outcome }}
          node_build=${{ steps.node_build.outcome }}
          playwright=${{ steps.playwright.outcome }}
          browser=${{ steps.browser.outcome }}
          pages_build=${{ steps.pages_build.outcome }}
          pages_export=${{ steps.pages_export.outcome }}
          EOF
          for log in install lint node-build playwright-package chromium browser server pages-build pages-server pages-export; do
            if [ -f "/tmp/$log.log" ]; then
              printf '\n===== %s =====\n' "$log" >> qa-output/summary.txt
              cat "/tmp/$log.log" >> qa-output/summary.txt
            fi
          done

      - name: Upload QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-qa-${{ github.run_id }}
          path: qa-output
          if-no-files-found: warn
          retention-days: 3

      - name: Publish audit pointer
        if: always()
        shell: bash
        run: |
          cp qa-output/summary.txt FINAL_AUDIT_REPORT.txt
          printf '%s\n' '${{ github.run_id }}' > FINAL_AUDIT_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FINAL_AUDIT_REPORT.txt FINAL_AUDIT_RUN_ID.txt
          git commit -m "chore: ulož výsledok finálneho auditu [skip audit]" || exit 0
          git push origin HEAD:claude/web-portfolio-publish-ynh7sk

      - name: Fail when verification failed
        if: always()
        shell: bash
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.lint.outcome }}" = "success"
          test "${{ steps.node_build.outcome }}" = "success"
          test "${{ steps.playwright.outcome }}" = "success"
          test "${{ steps.browser.outcome }}" = "success"
          test "${{ steps.pages_build.outcome }}" = "success"
          test "${{ steps.pages_export.outcome }}" = "success"
